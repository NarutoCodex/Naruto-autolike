<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF VIP STORE | AUTOLIKE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Orbitron:wght@700&display=swap');
        
        :root { 
            --bg: #050505; 
            --acc: #00ff88; 
            --card: #111111; 
            --border: #222222; 
            --text: #ffffff;
        }

        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Poppins', sans-serif; 
            margin: 0; 
            padding-bottom: 90px; 
        }

        .container { padding: 20px; max-width: 500px; margin: auto; }

        .card { 
            background: var(--card); 
            border: 1px solid var(--border); 
            border-radius: 20px; 
            padding: 22px; 
            margin-bottom: 20px; 
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .btn-main { 
            width: 100%; 
            padding: 15px; 
            background: var(--acc); 
            color: black; 
            border: none; 
            border-radius: 12px; 
            font-weight: bold; 
            cursor: pointer; 
            font-family: 'Orbitron';
            transition: 0.3s;
        }

        input, select { 
            width: 100%; 
            padding: 14px; 
            margin: 10px 0; 
            background: #000; 
            border: 1px solid var(--border); 
            color: white; 
            border-radius: 12px; 
            box-sizing: border-box; 
        }

        /* Bottom Nav */
        .nav { 
            position: fixed; 
            bottom: 0; 
            width: 100%; 
            background: rgba(0,0,0,0.95); 
            display: flex; 
            justify-content: space-around; 
            padding: 15px 0; 
            border-top: 1px solid var(--border); 
            z-index: 1000;
        }

        .nav-item { color: #555; text-decoration: none; text-align: center; font-size: 11px; flex: 1; cursor: pointer; }
        .nav-item.active { color: var(--acc); }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 4px; }

        .section { display: none; }
        .section.active { display: block; }

        /* Buy Modal */
        .modal { 
            display: none; 
            position: fixed; 
            inset: 0; 
            background: rgba(0,0,0,0.9); 
            z-index: 2000; 
            align-items: center; 
            justify-content: center; 
            padding: 20px; 
        }
        .modal-content { background: var(--card); border: 1px solid var(--acc); padding: 25px; border-radius: 20px; width: 100%; max-width: 350px; }

        /* Telegram Float */
        .tg-float {
            position: fixed;
            width: 60px;
            height: 60px;
            bottom: 100px;
            right: 20px;
            background-color: #0088cc;
            color: white;
            border-radius: 50%;
            text-align: center;
            font-size: 30px;
            z-index: 1001;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .tag { position: absolute; top: 15px; right: 15px; background: var(--acc); color: #000; font-size: 10px; padding: 4px 10px; border-radius: 6px; font-weight: bold; }
    </style>
</head>
<body>

<div id="authBox" style="height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;">
    <div class="card" style="width:100%; max-width:380px; text-align:center;">
        <h2 id="authT" style="color:var(--acc); font-family:'Orbitron';">LOGIN</h2>
        <input type="text" id="u" placeholder="Username">
        <input type="password" id="p" placeholder="Password">
        <button class="btn-main" onclick="handleAuth()">PROCEED</button>
        <p onclick="toggleAuth()" id="toggleTxt" style="font-size:12px; color:#666; margin-top:20px; cursor:pointer;">New? <span style="color:var(--acc)">Create Account</span></p>
    </div>
</div>

<div class="container" id="app" style="display:none;">
    
    <div id="dashSec" class="section active">
        <div class="card" style="border-left: 5px solid var(--acc);">
            <div style="font-size:10px; color:var(--acc);">● LIVE STATUS</div>
            <h2 id="statusText" style="margin:10px 0;">INACTIVE</h2>
            <div id="daysLeft" style="font-size:12px; color:#888;">No Active Plan</div>
        </div>

        <div id="plansList">
            </div>
    </div>

    <div id="histSec" class="section">
        <h3 style="color:var(--acc); font-family:'Orbitron';">HISTORY</h3>
        <div id="historyContainer" class="card" style="text-align:center; color:#555;">
            No logs found for your UID.
        </div>
    </div>

    <div id="accSec" class="section">
        <div class="card" style="text-align:center;">
            <h3 id="userDisplay" style="margin-bottom:20px;">USER</h3>
            <button class="btn-main" style="background:#200; color:#f44; border:1px solid #400;" onclick="location.reload()">LOGOUT</button>
        </div>
    </div>
</div>

<div class="modal" id="buyModal">
    <div class="modal-content">
        <h3 style="color:var(--acc); margin:0 0 15px 0;">Purchase Access</h3>
        <input type="number" id="buyUid" placeholder="Free Fire UID">
        <select id="buyRegion">
            <option value="India">India</option>
            <option value="Bangladesh">Bangladesh</option>
        </select>
        <input type="text" id="buyCode" placeholder="Redeem Code">
        <button class="btn-main" onclick="submitBuy()">DONE / SUBMIT</button>
        <p onclick="document.getElementById('buyModal').style.display='none'" style="text-align:center; color:#666; cursor:pointer; margin-top:15px;">Cancel</p>
    </div>
</div>

<nav class="nav" id="navBar" style="display:none;">
    <div class="nav-item active" onclick="tab('dashSec', this)"><i class="fa fa-home"></i>Dashboard</div>
    <div class="nav-item" onclick="tab('histSec', this)"><i class="fa fa-history"></i>History</div>
    <div class="nav-item" onclick="tab('accSec', this)"><i class="fa fa-user-circle"></i>Account</div>
</nav>

<a href="https://t.me/narutocodex8" class="tg-float" target="_blank"><i class="fab fa-telegram-plane"></i></a>

<script>
    let isLogin = true; 
    let curUser = null;

    // Fixed Plans List
    const myPlans = [
        { days: 28, price: 90, tag: "STARTER" },
        { days: 60, price: 180, tag: "POPULAR" },
        { days: 90, price: 250, tag: "BEST VALUE" },
        { days: 120, price: 320, tag: "ULTIMATE" }
    ];

    function toggleAuth() {
        isLogin = !isLogin;
        document.getElementById('authT').innerText = isLogin ? "LOGIN" : "SIGNUP";
        document.getElementById('toggleTxt').innerHTML = isLogin ? 'New? <span style="color:var(--acc)">Create Account</span>' : 'Have account? <span style="color:var(--acc)">Login</span>';
    }

    async function handleAuth() {
        const u = document.getElementById('u').value.trim();
        const p = document.getElementById('p').value.trim();
        const path = isLogin ? 'login' : 'signup';
        const res = await fetch(`/api/auth/${path}`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ username: u, password: p })
        });
        const data = await res.json();
        if(data.success) {
            if(isLogin) { curUser = data.user; showUI(data.user); }
            else { alert("Created! Now Login."); location.reload(); }
        } else { alert(data.msg); }
    }

    function showUI(user) {
        document.getElementById('authBox').style.display='none';
        document.getElementById('app').style.display='block';
        document.getElementById('navBar').style.display='flex';
        document.getElementById('userDisplay').innerText = user.username.toUpperCase();
        
        if(user.status === 'active') {
            document.getElementById('statusText').innerText = "ACTIVE ✅";
            document.getElementById('statusText').style.color = "var(--acc)";
        } else if(user.status === 'pending') {
            document.getElementById('statusText').innerText = "PENDING... ⏳";
        }

        // Render Plans
        let html = '';
        myPlans.forEach(p => {
            html += `<div class="card">
                <span class="tag">${p.tag}</span>
                <h3 style="margin:0;">${p.days} DAYS VIP</h3>
                <div style="font-size:24px; color:var(--acc); font-weight:bold; margin:10px 0;">₹${p.price}</div>
                <button class="btn-main" onclick="document.getElementById('buyModal').style.display='flex'">BUY ACCESS</button>
            </div>`;
        });
        document.getElementById('plansList').innerHTML = html;
    }

    async function submitBuy() {
        const uid = document.getElementById('buyUid').value;
        const code = document.getElementById('buyCode').value;
        if(!uid || !code) return alert("Fill all details!");

        await fetch('/api/request-active', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ username: curUser.username, uid, code })
        });
        alert("Request Sent! Wait for Approval.");
        location.reload();
    }

    function tab(id, el) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }
</script>
</body>
</html>
