<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEXI TOOL - LOGIN</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');
        :root { --bg: #0a0b0d; --card: #15171a; --orange: #ff6a00; --border: #23262a; }
        body { background: var(--bg); color: white; font-family: 'Poppins', sans-serif; margin: 0; padding-bottom: 80px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 15px; padding: 20px; margin: 15px; }
        .btn-orange { width: 100%; padding: 14px; background: linear-gradient(90deg, #ff8c00, #ff4500); color: white; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; }
        input, select { width: 100%; padding: 14px; margin: 10px 0; background: #1c1f24; border: 1px solid var(--border); color: white; border-radius: 10px; box-sizing: border-box; }
        .nav-bottom { position: fixed; bottom: 0; width: 100%; background: #111317; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid var(--border); }
        .nav-btn { color: #8e9297; text-align: center; font-size: 10px; flex: 1; cursor: pointer; }
        .nav-btn.active { color: white; }
        .section { display: none; } .section.active { display: block; }
        .qr-img { width: 220px; border-radius: 10px; border: 4px solid white; display: block; margin: 10px auto; }
    </style>
</head>
<body>

<div id="authBox" style="height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px;">
    <img src="1000113658.jpg" style="width:80px; border-radius:20px; margin-bottom:10px;">
    <h1 style="font-size:22px; margin-bottom:5px;">ZEXI TOOL</h1>
    <p style="font-size:10px; color:#888; margin-bottom:20px;">FREE FIRE BOT MAKER</p>
    <div class="card" style="width:100%; max-width:350px;">
        <div style="display:flex; gap:10px; margin-bottom:15px;">
            <button class="btn-orange" style="flex:1;">LOGIN</button>
            <button class="btn-orange" style="flex:1; background:#222;">SIGN UP</button>
        </div>
        <input type="text" id="u" placeholder="Enter your email">
        <input type="password" id="p" placeholder="Enter your password">
        <button class="btn-orange" onclick="handleAuth()">LOGIN</button>
    </div>
</div>

<div id="app" style="display:none;">
    <div id="homeSec" class="section active">
        <div class="card"><img src="1000113658.jpg" style="width:100%; border-radius:10px;"></div>
        <div class="card" style="display:flex; justify-content:space-between;">
            <b>WALLET: ₹<span id="balDisplay">0</span></b>
            <i class="fa fa-wallet" style="color:var(--orange)"></i>
        </div>
        <div id="plansList"></div>
    </div>

    <div id="walletSec" class="section">
        <div class="card" style="text-align:center;">
            <h3 style="font-size:16px;">Payment</h3>
            <p style="font-size:11px; color:#888;">Scan OR Click QR to Pay</p>
            <img src="1000113660.jpg" class="qr-img" onerror="this.src='https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=example'">
            <h1 style="margin:10px 0;">₹350</h1>
            <select><option>Starter - ₹350</option></select>
            <input type="text" id="payUtr" placeholder="ENTER UTR (12+ CHARACTERS)">
            <button class="btn-orange" onclick="submitPayment()">SUBMIT PAYMENT</button>
        </div>
    </div>

    <div class="nav-bottom">
        <div class="nav-btn active" onclick="tab('homeSec', this)"><i class="fa fa-home"></i>Home</div>
        <div class="nav-btn" onclick="tab('homeSec', this)"><i class="fa fa-history"></i>History</div>
        <div class="nav-btn" onclick="tab('walletSec', this)"><i class="fa fa-wallet"></i>Wallet</div>
    </div>
</div>

<script>
    let userData = null;
    async function handleAuth() {
        const u = document.getElementById('u').value.trim();
        const p = document.getElementById('p').value.trim();
        const res = await fetch('/api/auth/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:u, password:p}) });
        const data = await res.json();
        if(data.success) { userData = data.user; document.getElementById('authBox').style.display='none'; document.getElementById('app').style.display='block'; document.getElementById('balDisplay').innerText = userData.balance; }
        else alert(data.msg);
    }
    function tab(id, el) { document.querySelectorAll('.section').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
</script>
</body>
</html>
