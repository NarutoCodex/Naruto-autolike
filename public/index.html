<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEXI TOOL - SYSTEM CONTROL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Orbitron:wght@700&display=swap');
        :root { --bg: #0a0b0d; --card: #15171a; --orange: #ff6a00; --border: #23262a; }
        body { background: var(--bg); color: white; font-family: 'Poppins', sans-serif; margin: 0; padding-bottom: 80px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 15px; padding: 20px; margin: 15px; }
        .btn-orange { width: 100%; padding: 14px; background: linear-gradient(90deg, #ff8c00, #ff4500); color: white; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; transition: 0.3s; font-family: 'Poppins'; }
        input { width: 100%; padding: 14px; margin: 10px 0; background: #1c1f24; border: 1px solid var(--border); color: white; border-radius: 10px; box-sizing: border-box; }
        .nav-bottom { position: fixed; bottom: 0; width: 100%; background: #111317; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid var(--border); z-index: 1000; }
        .nav-btn { color: #8e9297; text-align: center; font-size: 10px; flex: 1; cursor: pointer; transition: 0.3s; }
        .nav-btn.active { color: white; }
        .nav-btn i { font-size: 20px; display: block; margin-bottom: 4px; }
        .section { display: none; } .section.active { display: block; }
        .dash-img { width: 100%; border-radius: 15px; border: 1px solid var(--orange); margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="authBox" style="height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px;">
    <img src="1000113658.jpg" style="width:100px; border-radius:20px; margin-bottom:15px; border: 2px solid var(--orange);">
    <h1 style="font-family: Orbitron; font-size: 26px;">ZEXI TOOL</h1>
    <p style="color: #888; font-size: 12px; margin-top: -5px;">SECURE ACCESS PANEL</p>
    <div class="card" style="width:100%; max-width:350px;">
        <input type="text" id="u" placeholder="Email Address">
        <input type="password" id="p" placeholder="Password">
        <button class="btn-orange" onclick="handleAuth()">LOGIN</button>
    </div>
</div>

<div id="app" style="display:none;">
    <div id="homeSec" class="section active">
        <div class="card" style="padding: 10px;"><img src="1000113658.jpg" class="dash-img"></div>
        <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
            <b>WALLET: ₹<span id="balDisplay">0</span></b>
            <i class="fa fa-wallet" style="color:var(--orange); font-size:25px;"></i>
        </div>
        <div id="plansList"></div> </div>
    <div id="walletSec" class="section">
        <div class="card" style="text-align:center;">
            <p style="font-weight: 600; color: var(--orange);">SCAN QR TO PAY Any Amount</p>
            <img src="1000113660.jpg" style="width:230px; border-radius:15px; border:1px solid #333; margin: 10px 0;">
            <input type="number" id="payAmt" placeholder="Enter Amount Paid">
            <input type="text" id="payUtr" placeholder="Enter UTR Number">
            <button class="btn-orange" onclick="submitPayment()">SUBMIT PAYMENT</button>
        </div>
    </div>
    <div id="orderSec" class="section"><div class="card"><h3>Orders</h3><div id="ordersList"></div></div></div>
    <div id="supportSec" class="section"><div class="card"><h3>Support</h3><p style="text-align:center; color:#666;">Chat is on hold.</p></div></div>
    <div class="nav-bottom">
        <div class="nav-btn active" onclick="tab('homeSec', this)"><i class="fa fa-home"></i>Home</div>
        <div class="nav-btn" onclick="tab('orderSec', this)"><i class="fa fa-shopping-cart"></i>Orders</div>
        <div class="nav-btn" onclick="tab('supportSec', this)"><i class="fa fa-headset"></i>Support</div>
        <div class="nav-btn" onclick="tab('walletSec', this)"><i class="fa fa-wallet"></i>Wallet</div>
    </div>
</div>

<script>
    let user = null; let prices = {};
    async function handleAuth() {
        const u = document.getElementById('u').value.trim(); const p = document.getElementById('p').value.trim();
        const res = await fetch('/api/auth/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:u, password:p}) });
        const data = await res.json(); if(data.success) { user = data.user; syncUI(); } else alert(data.msg);
    }
    async function syncUI() {
        document.getElementById('authBox').style.display='none'; document.getElementById('app').style.display='block';
        document.getElementById('balDisplay').innerText = user.balance;
        
        // Plans Rendering
        const pres = await fetch('/api/prices'); prices = await pres.json();
        let pH = '';
        [{d:30,k:'p30'},{d:60,k:'p60'},{d:90,k:'p90'},{d:120,k:'p120'}].forEach(p => {
            pH += `<div class="card" style="display:flex; justify-content:space-between; align-items:center; margin:10px 15px;">
                <div><b>${p.d} DAYS VIP</b><br><small>100 Likes Daily | Price: ₹${prices[p.k]}</small></div>
                <button class="btn-orange" style="width:auto; padding:8px 15px;" onclick="buy(${prices[p.k]}, ${p.d})">BUY</button>
            </div>`;
        });
        document.getElementById('plansList').innerHTML = pH;
    }
    // Other functions...
</script>
</body>
</html>
