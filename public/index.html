<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEXI TOOL - CONTROL PANEL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Orbitron:wght@700&display=swap');
        :root { --bg: #0a0b0d; --card: #15171a; --orange: #ff6a00; --border: #23262a; }
        body { background: var(--bg); color: white; font-family: 'Poppins', sans-serif; margin: 0; padding-bottom: 85px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 15px; padding: 20px; margin: 15px; }
        .btn-orange { width: 100%; padding: 14px; background: linear-gradient(90deg, #ff8c00, #ff4500); color: white; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; font-family: 'Poppins'; }
        input { width: 100%; padding: 14px; margin: 10px 0; background: #1c1f24; border: 1px solid var(--border); color: white; border-radius: 10px; box-sizing: border-box; }
        .nav-bottom { position: fixed; bottom: 0; width: 100%; background: #111317; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid var(--border); }
        .nav-btn { color: #8e9297; text-align: center; font-size: 10px; flex: 1; cursor: pointer; }
        .nav-btn.active { color: white; }
        .nav-btn i { font-size: 20px; display: block; margin-bottom: 4px; }
        .section { display: none; } .section.active { display: block; }
        .dash-img { width: 100%; border-radius: 15px; border: 1px solid var(--orange); }
        .chat-msg { margin-bottom: 10px; padding: 10px; border-radius: 10px; max-width: 85%; font-size: 13px; }
        .user-msg { background: rgba(255,106,0,0.1); margin-left: auto; border-right: 3px solid var(--orange); }
        .admin-msg { background: rgba(255,255,255,0.05); border-left: 3px solid #00ff88; }
    </style>
</head>
<body>

<div id="authBox" style="height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px;">
    <img src="1000113658.jpg" style="width:100px; border-radius:20px; margin-bottom:15px; border: 2px solid var(--orange);">
    <h1 style="font-family: Orbitron; font-size: 26px; color: var(--orange);">ZEXI TOOL</h1>
    <div class="card" style="width:100%; max-width:350px;">
        <input type="text" id="u" placeholder="Enter Email/Username">
        <input type="password" id="p" placeholder="Enter Password">
        <button class="btn-orange" onclick="handleAuth()">LOGIN SYSTEM</button>
    </div>
</div>

<div id="app" style="display:none;">
    <div class="container">
        <div id="homeSec" class="section active">
            <div class="card" style="padding:10px;"><img src="1000113658.jpg" class="dash-img"></div>
            <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                <div><b>BALANCE</b><br><span style="font-size:22px; color:var(--orange);">₹<span id="balDisplay">0</span></span></div>
                <i class="fa fa-wallet" style="font-size:25px; color:var(--orange)"></i>
            </div>
            <h4 style="margin: 10px 15px; font-family: Orbitron; font-size: 13px;">AVAILABLE VIP PLANS</h4>
            <div id="plansList"></div>
        </div>

        <div id="orderSec" class="section">
            <h3 style="margin:15px; font-family: Orbitron;">ORDER HISTORY</h3>
            <div id="ordersList"></div>
        </div>

        <div id="supportSec" class="section">
            <h3 style="margin:15px; font-family: Orbitron;">CHAT SUPPORT</h3>
            <div class="card" id="chatDisplay" style="height:350px; overflow-y:auto; padding: 10px;"></div>
            <div class="card" style="padding:10px; display: flex; gap: 10px;">
                <input type="text" id="supportMsg" placeholder="Type message..." style="margin:0;">
                <button class="btn-orange" onclick="sendSupportMsg()" style="width:80px;"><i class="fa fa-paper-plane"></i></button>
            </div>
        </div>

        <div id="walletSec" class="section">
            <div class="card" style="text-align:center;">
                <p style="font-weight: 600; color: var(--orange);">SCAN QR TO ADD BALANCE</p>
                <img src="1000113660.jpg" style="width:230px; border-radius:15px; border:1px solid #333; margin: 10px 0;">
                <input type="number" id="payAmt" placeholder="Enter Amount Paid">
                <input type="text" id="payUtr" placeholder="Enter 12-digit UTR Number">
                <button class="btn-orange" onclick="submitPayment()">SUBMIT PAYMENT</button>
            </div>
        </div>
    </div>

    <div class="nav-bottom">
        <div class="nav-btn active" onclick="tab('homeSec', this)"><i class="fa fa-home"></i>Home</div>
        <div class="nav-btn" onclick="tab('orderSec', this)"><i class="fa fa-list"></i>Orders</div>
        <div class="nav-btn" onclick="tab('supportSec', this)"><i class="fa fa-comment-dots"></i>Support</div>
        <div class="nav-btn" onclick="tab('walletSec', this)"><i class="fa fa-wallet"></i>Wallet</div>
    </div>
</div>

<script>
    let user = null; let prices = {};
    async function handleAuth() {
        const u = document.getElementById('u').value.trim(); const p = document.getElementById('p').value.trim();
        const res = await fetch('/api/auth/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:u, password:p}) });
        const data = await res.json(); if(data.success) { user = data.user; syncUI(); } else alert(data.msg);
    }

    async function syncUI() {
        document.getElementById('authBox').style.display='none'; document.getElementById('app').style.display='block';
        document.getElementById('balDisplay').innerText = user.balance;
        
        const pres = await fetch('/api/get-prices'); prices = await pres.json();
        let pH = '';
        [{d:30,k:'p30'},{d:60,k:'p60'},{d:90,k:'p90'},{d:120,k:'p120'}].forEach(p => {
            pH += `<div class="card" style="display:flex; justify-content:space-between; align-items:center; margin:10px 15px;">
                <div><b>${p.d} DAYS VIP</b><br><small style="color:#666;">Daily 100 Likes Delivery</small></div>
                <button class="btn-orange" style="width:auto; padding:8px 15px;" onclick="buy(${prices[p.k]}, ${p.d})">₹${prices[p.k]}</button>
            </div>`;
        });
        document.getElementById('plansList').innerHTML = pH;

        let oH = ''; user.orders.forEach(o => {
            oH += `<div class="card" style="border-left: 4px solid var(--orange);"><b>Protocol: ${o.days} Days</b><br><small>UID: ${o.uid} | Price: ₹${o.price}</small><br><small style="color:#00ff88;">Daily Delivery: 100 Likes</small></div>`;
        });
        document.getElementById('ordersList').innerHTML = oH || "<p style='text-align:center; color:#666;'>No active orders.</p>";

        let cH = ''; user.messages.forEach(m => {
            cH += `<div class="chat-msg ${m.sender}-msg"><b>${m.sender.toUpperCase()}:</b> ${m.text}</div>`;
        });
        document.getElementById('chatDisplay').innerHTML = cH;
    }

    async function submitPayment() {
        const amt = document.getElementById('payAmt').value; const utr = document.getElementById('payUtr').value;
        if(utr.length < 12) return alert("Enter valid 12-digit UTR!");
        await fetch('/api/add-balance', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:user.username, amount:amt, code:utr}) });
        alert("Payment Submitted! Wait for Admin Approval.");
    }

    async function sendSupportMsg() {
        const text = document.getElementById('supportMsg').value;
        await fetch('/api/support/send', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:user.username, text}) });
        location.reload();
    }

    function tab(id, el) { 
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active')); 
        document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('active')); 
        document.getElementById(id).classList.add('active'); el.classList.add('active'); 
    }
</script>
</body>
</html>
