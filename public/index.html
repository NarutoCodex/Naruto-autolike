<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF AUTOLIKE PRO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap');
        :root { --bg: #050505; --card: #121212; --accent: #00ff88; --text: #fff; --border: #222; }
        body { background: var(--bg); color: var(--text); font-family: 'Poppins', sans-serif; margin: 0; padding-bottom: 80px; }
        .container { padding: 20px; max-width: 500px; margin: auto; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        .btn-main { width: 100%; padding: 15px; background: var(--accent); color: #000; border: none; border-radius: 12px; font-weight: bold; font-family: 'Orbitron'; cursor: pointer; }
        input, select { width: 100%; padding: 14px; margin: 10px 0; background: #000; border: 1px solid var(--border); color: #fff; border-radius: 12px; box-sizing: border-box; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid var(--border); }
        .nav-item { color: #555; text-decoration: none; font-size: 11px; text-align: center; }
        .nav-item.active { color: var(--accent); }
        .section { display: none; }
        .section.active { display: block; }
    </style>
</head>
<body>

<div id="authBox" style="height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;">
    <div class="card" style="width:100%; max-width:380px; text-align:center;">
        <h2 id="authTitle" style="font-family:'Orbitron'; color:var(--accent);">ACCESS LOGIN</h2>
        <input type="text" id="user" placeholder="Username">
        <input type="password" id="pass" placeholder="Password">
        <button class="btn-main" onclick="handleAuth()">PROCEED</button>
        <p onclick="toggleAuth()" id="toggleText" style="font-size:13px; color:#666; margin-top:20px; cursor:pointer;">New? <span style="color:var(--accent)">Create Account</span></p>
    </div>
</div>

<div class="container" id="mainApp" style="display:none;">
    <div class="card" style="border-left: 5px solid var(--accent);">
        <div style="font-size:10px; font-family:'Orbitron';"><span style="color:var(--accent)">●</span> LIVE TRACKING</div>
        <div style="font-size:22px; font-weight:bold; margin:10px 0;">Today: <span id="dailyCount" style="color:var(--accent);">0</span> / 100</div>
        <div id="statusMsg" style="font-size:12px; color:orange; font-weight:bold;">STATUS: NOT ACTIVE</div>
    </div>

    <div id="dashboard" class="section active">
        <div id="plansContainer"></div>
        <div class="card">
            <h4 style="font-family:'Orbitron'; color:var(--accent); margin:0 0 15px 0;">MY LIKES INFO</h4>
            <div id="likesInfo" style="font-size:13px; line-height:2;">
                ID Name: <b id="idName" style="float:right">---</b><br>
                UID: <b id="dispUid" style="float:right">---</b><br>
                Status: <b id="liveStatus" style="float:right; color:red">INACTIVE</b><br>
                Total Likes: <b id="totalL" style="float:right">0</b>
            </div>
        </div>
    </div>

    <div id="account" class="section">
        <h3 style="font-family:'Orbitron';">ACCOUNT</h3>
        <div class="card" style="text-align:center;">
            <h4 id="profileName">USER</h4>
            <button onclick="location.reload()" style="background:#1a0000; color:red; border:1px solid #300; padding:12px; width:100%; border-radius:10px; font-weight:bold;">LOGOUT</button>
        </div>
    </div>
</div>

<nav class="bottom-nav" id="nav" style="display:none;">
    <a href="javascript:void(0)" class="nav-item active" onclick="tab('dashboard',this)"><i class="fas fa-home"></i><br>Home</a>
    <a href="javascript:void(0)" class="nav-item" onclick="tab('account',this)"><i class="fas fa-user"></i><br>Account</a>
</nav>

<script>
    let isLogin = true; let currentUser = "";

    function toggleAuth() {
        isLogin = !isLogin;
        document.getElementById('authTitle').innerText = isLogin ? "ACCESS LOGIN" : "CREATE ACCOUNT";
        document.getElementById('toggleText').innerHTML = isLogin ? 'New? <span style="color:var(--accent)">Create Account</span>' : 'Have account? <span style="color:var(--accent)">Login</span>';
    }

    async function handleAuth() {
        const u = document.getElementById('user').value.trim();
        const p = document.getElementById('pass').value.trim();
        const path = isLogin ? 'login' : 'signup';
        const res = await fetch(`/api/auth/${path}`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username: u, password: p})
        });
        const data = await res.json();
        if(data.success) {
            if(isLogin) showDash(data.user);
            else { alert("Account Created! Login now."); location.reload(); }
        } else alert(data.msg);
    }

    async function loadPlans() {
        const res = await fetch('/api/plans'); const plans = await res.json();
        let html = '';
        plans.forEach(p => {
            html += `<div class="card">
                <h3 style="margin:0; font-family:'Orbitron';">${p.days} DAYS VIP</h3>
                <div style="font-size:24px; color:var(--accent); font-weight:bold; margin:10px 0;">₹${p.price}</div>
                <button class="btn-main" onclick="openRedeem('${p.days} Days')">BUY ACCESS</button>
            </div>`;
        });
        document.getElementById('plansContainer').innerHTML = html;
    }

    function showDash(user) {
        currentUser = user.username;
        document.getElementById('authBox').style.display='none';
        document.getElementById('mainApp').style.display='block';
        document.getElementById('nav').style.display='flex';
        document.getElementById('profileName').innerText = user.username.toUpperCase();
        if(user.status === 'active') {
            document.getElementById('statusMsg').innerText = "✅ YOUR REQUEST APPROVED";
            document.getElementById('statusMsg').style.color = "var(--accent)";
            document.getElementById('liveStatus').innerText = "ACTIVE";
            document.getElementById('liveStatus').style.color = "var(--accent)";
            document.getElementById('idName').innerText = user.username;
            document.getElementById('dispUid').innerText = user.uid;
            document.getElementById('totalL').innerText = user.totalLikes || 0;
        }
        loadPlans();
    }

    function tab(id, el) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active'); el.classList.add('active');
    }
</script>
</body>
</html>
