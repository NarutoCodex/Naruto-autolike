<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEXI TOOL - CONTROL PANEL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Orbitron:wght@700&display=swap');
        :root { --bg: #0a0b0d; --card: #15171a; --orange: #ff6a00; --border: #23262a; }
        body { background: var(--bg); color: white; font-family: 'Poppins', sans-serif; margin: 0; padding-bottom: 85px; overflow-x: hidden; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 15px; padding: 20px; margin: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.6); }
        .btn-orange { width: 100%; padding: 14px; background: linear-gradient(90deg, #ff8c00, #ff4500); color: white; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; text-transform: uppercase; font-family: 'Poppins'; transition: 0.3s; }
        .btn-orange:hover { transform: scale(1.02); }
        input { width: 100%; padding: 14px; margin: 10px 0; background: #1c1f24; border: 1px solid var(--border); color: white; border-radius: 10px; box-sizing: border-box; }
        
        /* Fixed Navigation */
        .nav-bottom { position: fixed; bottom: 0; width: 100%; background: #111317; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid var(--border); z-index: 9999; }
        .nav-btn { color: #8e9297; text-align: center; font-size: 10px; flex: 1; cursor: pointer; transition: 0.3s; }
        .nav-btn.active { color: white; }
        .nav-btn i { font-size: 20px; display: block; margin-bottom: 4px; }
        
        .section { display: none; } .section.active { display: block; }
        .dash-img { width: 100%; border-radius: 15px; border: 1px solid var(--orange); margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="authBox" style="height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px;">
    <img src="1000113707.jpg" style="width:90px; border-radius:20px; margin-bottom:15px; border: 1px solid var(--orange);">
    <h1 style="font-family: Orbitron; font-size: 26px; color: var(--orange);">ZEXI TOOL</h1>
    <div class="card" style="width:100%; max-width:350px;">
        <input type="text" id="u" placeholder="Email Address">
        <input type="password" id="p" placeholder="Password">
        <button class="btn-orange" onclick="handleAuth()">LOGIN SYSTEM</button>
    </div>
</div>

<div id="app" style="display:none;">
    <div id="homeSec" class="section active">
        <div class="card" style="padding: 10px;"><img src="1000113707.jpg" class="dash-img"></div>
        <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
            <div><small style="color:#888;">MY BALANCE</small><br><b style="font-size:22px; color:var(--orange);">₹<span id="balDisplay">0</span></b></div>
            <i class="fa fa-wallet" style="font-size:28px; color:var(--orange)"></i>
        </div>
        <h3 style="margin: 10px 15px; font-family: Orbitron; font-size: 14px;">AVAILABLE VIP PLANS</h3>
        <div id="plansList"></div>
    </div>

    <div id="orderSec" class="section">
        <h3 style="margin: 20px 15px; font-family: Orbitron;">ORDER HISTORY</h3>
        <div id="ordersList"></div>
    </div>

    <div id="walletSec" class="section">
        <div class="card" style="text-align:center;">
            <p style="font-family: Orbitron; color: var(--orange); font-size: 14px;">SCAN QR TO PAY</p>
            <img src="1000113707.jpg" style="width:230px; border-radius:15px; border:1px solid #333; margin: 15px 0;">
            <input type="number" id="payAmt" placeholder="Enter Amount Paid">
            <input type="text" id="payUtr" placeholder="Enter UTR (12+ Characters)">
            <button class="btn-orange" onclick="submitPayment()">SUBMIT PAYMENT</button>
        </div>
    </div>

    <div class="nav-bottom">
        <div class="nav-btn active" onclick="tab('homeSec', this)"><i class="fa fa-home"></i>Home</div>
        <div class="nav-btn" onclick="tab('orderSec', this)"><i class="fa fa-history"></i>History</div>
        <div class="nav-btn" onclick="tab('orderSec', this)"><i class="fa fa-box-open"></i>Orders</div>
        <div class="nav-btn" onclick="tab('walletSec', this)"><i class="fa fa-wallet"></i>Wallet</div>
    </div>
</div>

<script>
    let user = null;
    const plans = [{d:30,p:100},{d:60,p:200},{d:90,p:300},{d:120,p:400}];

    async function handleAuth() {
        const u = document.getElementById('u').value.trim(); const p = document.getElementById('p').value.trim();
        const res = await fetch('/api/auth/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:u, password:p}) });
        const data = await res.json();
        if(data.success) { user = data.user; syncUI(); } else alert(data.msg);
    }

    function syncUI() {
        document.getElementById('authBox').style.display='none'; document.getElementById('app').style.display='block';
        document.getElementById('balDisplay').innerText = user.balance;
        
        let pH = '';
        plans.forEach(p => {
            pH += `<div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                <div><b>${p.d} DAYS VIP</b><br><small style="color:#666;">Daily 100 Likes Delivery</small></div>
                <button class="btn-orange" style="width:auto; padding:10px 20px;" onclick="buy(${p.p}, ${p.d})">₹${p.p}</button>
            </div>`;
        });
        document.getElementById('plansList').innerHTML = pH;

        let oH = ''; (user.orders || []).forEach(o => {
            oH += `<div class="card" style="border-left: 5px solid var(--orange);"><b>Protocol: ${o.days} Days</b><br><small>UID: ${o.uid} | Status: <span style="color:#00ff88;">Running</span></small></div>`;
        });
        document.getElementById('ordersList').innerHTML = oH || "<p style='text-align:center; color:#666;'>No active orders.</p>";
    }

    async function submitPayment() {
        const amt = document.getElementById('payAmt').value; const utr = document.getElementById('payUtr').value;
        if(utr.length < 10) return alert("Enter valid UTR!");
        await fetch('/api/add-balance', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:user.username, amount:amt, code:utr}) });
        alert("Submitted! Wait for approval.");
    }

    function tab(id, el) { 
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active')); 
        document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('active')); 
        document.getElementById(id).classList.add('active'); el.classList.add('active'); 
    }
</script>
</body>
</html>
