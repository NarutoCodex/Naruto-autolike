<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF VIP STORE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050505; --acc: #00ff88; --card: #111; --border: #222; }
        body { background: var(--bg); color: white; font-family: 'Poppins', sans-serif; margin: 0; padding-bottom: 80px; }
        .container { padding: 15px; max-width: 500px; margin: auto; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 20px; margin-bottom: 15px; position: relative; overflow: hidden; }
        .btn { width: 100%; padding: 14px; background: var(--acc); color: black; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 14px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: white; border-radius: 10px; box-sizing: border-box; }
        .nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #111; z-index: 100; }
        .nav-item { color: #555; text-decoration: none; text-align: center; font-size: 11px; transition: 0.3s; }
        .nav-item.active { color: var(--acc); }
        .section { display: none; }
        .section.active { display: block; }
        .tag { position: absolute; top: 10px; right: 10px; background: var(--acc); color: black; font-size: 10px; padding: 3px 8px; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

<div id="authBox" style="height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;">
    <div class="card" style="width:100%; text-align:center; max-width:350px;">
        <h2 id="authT" style="color:var(--acc)">LOGIN</h2>
        <input type="text" id="u" placeholder="Username">
        <input type="password" id="p" placeholder="Password">
        <button class="btn" onclick="handleAuth()">PROCEED</button>
        <p onclick="toggleAuth()" style="font-size:12px; margin-top:15px; cursor:pointer; color:#666;">New? <span style="color:var(--acc)">Create Account</span></p>
    </div>
</div>

<div class="container" id="app" style="display:none;">
    <div id="dashSec" class="section active">
        <div class="card" style="border-left: 5px solid var(--acc);">
            <div style="font-size:10px; color:var(--acc)">● LIVE TRACKING</div>
            <h2 id="statusText" style="margin:10px 0; font-size:18px;">INACTIVE</h2>
        </div>

        <div id="plansList"></div>

        <div class="card">
            <h4 style="color:var(--acc); margin:0 0 15px 0;"><i class="fa fa-shield"></i> MY LIKES INFO</h4>
            <div style="font-size:13px; line-height:2;">
                ID Name: <span id="idName" style="float:right">---</span><br>
                UID: <span id="idUid" style="float:right">---</span><br>
                Daily Likes: <span style="float:right; color:var(--acc)">100</span><br>
                Total Sent: <span id="totalS" style="float:right">0</span>
            </div>
        </div>
    </div>

    <div id="histSec" class="section">
        <h3 style="color:var(--acc)">History</h3>
        <div class="card">No transactions found.</div>
    </div>

    <div id="accSec" class="section">
        <h3 style="color:var(--acc)">My Account</h3>
        <div class="card" style="text-align:center;">
            <div style="width:70px; height:70px; background:var(--acc); border-radius:50%; margin:0 auto 15px; color:black; font-size:30px; line-height:70px; font-weight:bold;" id="avatar">U</div>
            <h4 id="userDisplay">USERNAME</h4>
            <button class="btn" style="background:#200; color:#f44; border:1px solid #400;" onclick="location.reload()">LOGOUT ACCOUNT</button>
        </div>
    </div>
</div>

<div class="nav" id="navBar" style="display:none;">
    <div class="nav-item active" onclick="tab('dashSec', this)"><i class="fa fa-th-large" style="font-size:20px;"></i><br>Dashboard</div>
    <div class="nav-item" onclick="tab('histSec', this)"><i class="fa fa-history" style="font-size:20px;"></i><br>History</div>
    <div class="nav-item" onclick="tab('accSec', this)"><i class="fa fa-user-circle" style="font-size:20px;"></i><br>Account</div>
</div>

<script>
    let isL = true; let curU = "";
    function toggleAuth() { isL = !isL; document.getElementById('authT').innerText = isL ? "LOGIN" : "SIGNUP"; }

    async function handleAuth() {
        const u = document.getElementById('u').value.trim();
        const p = document.getElementById('p').value.trim();
        const path = isL ? 'login' : 'signup';
        const res = await fetch(`/api/auth/${path}`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:u, password:p}) });
        const data = await res.json();
        if(data.success) { if(isL) showUI(data.user); else alert("Account Created! Login now."); } else alert(data.msg);
    }

    function showUI(user) {
        document.getElementById('authBox').style.display='none';
        document.getElementById('app').style.display='block';
        document.getElementById('navBar').style.display='flex';
        document.getElementById('userDisplay').innerText = user.username.toUpperCase();
        document.getElementById('avatar').innerText = user.username[0].toUpperCase();
        if(user.status === 'active') {
            document.getElementById('statusText').innerText = "ACTIVE ✅";
            document.getElementById('idName').innerText = user.username;
            document.getElementById('idUid').innerText = user.uid;
            document.getElementById('totalS').innerText = user.totalLikes || 0;
        }
        loadPlans();
    }

    async function loadPlans() {
        const res = await fetch('/api/plans'); const plans = await res.json();
        let h = ''; plans.forEach(p => {
            h += `<div class="card">
                <span class="tag">${p.tag || 'VIP'}</span>
                <h3>${p.days} DAYS VIP</h3>
                <div style="font-size:22px; font-weight:bold; color:var(--acc); margin:10px 0;">₹${p.price} <span style="font-size:13px; text-decoration:line-through; color:#444;">₹${p.oldPrice}</span></div>
                <button class="btn" onclick="alert('Submit UID to Admin for activation')">BUY ACCESS</button>
            </div>`;
        });
        document.getElementById('plansList').innerHTML = h;
    }

    function tab(id, el) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active'); el.classList.add('active');
    }
</script>
</body>
</html>
