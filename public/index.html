<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEXI TOOL - LOGIN</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Orbitron:wght@700&display=swap');
        :root { --bg: #0a0b0d; --card: #15171a; --orange: #ff6a00; --border: #23262a; }
        body { background: var(--bg); color: white; font-family: 'Poppins', sans-serif; margin: 0; padding-bottom: 85px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 15px; padding: 20px; margin: 15px; }
        .btn-orange { width: 100%; padding: 14px; background: var(--orange); color: white; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; text-transform: uppercase; }
        input, select { width: 100%; padding: 14px; margin: 10px 0; background: #1c1f24; border: 1px solid var(--border); color: white; border-radius: 10px; box-sizing: border-box; }
        .nav-bottom { position: fixed; bottom: 0; width: 100%; background: #111317; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid var(--border); z-index: 1000; }
        .nav-btn { color: #8e9297; text-align: center; font-size: 10px; flex: 1; cursor: pointer; }
        .nav-btn.active { color: white; }
        .nav-btn i { font-size: 20px; display: block; margin-bottom: 4px; }
        .section { display: none; } .section.active { display: block; }
        .auth-logo { width: 100px; border-radius: 20px; border: 1px solid #333; margin-bottom: 10px; }
        .cf-box { border: 1px solid #333; padding: 10px; border-radius: 5px; margin: 15px 0; display: flex; align-items: center; justify-content: space-between; font-size: 12px; }
    </style>
</head>
<body>

<div id="authBox" style="height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; background: radial-gradient(circle at center, #111 0%, #000 100%);">
    <img src="1000113658.jpg" class="auth-logo">
    <h1 style="font-family: Orbitron; font-size: 22px; margin: 5px 0;">ZEXI TOOL</h1>
    <p style="color: #888; font-size: 10px; text-transform: uppercase; letter-spacing: 1px;">Free Fire Bot Maker</p>
    
    <div class="card" style="width:100%; max-width:350px;">
        <div style="display:flex; background:#1c1f24; border-radius:10px; margin-bottom:15px; padding:5px;">
            <button onclick="setAuth(true)" id="btnL" style="flex:1; border:none; padding:10px; border-radius:8px; background:var(--orange); color:white; font-weight:bold;"><i class="fa fa-sign-in-alt"></i> LOGIN</button>
            <button onclick="setAuth(false)" id="btnS" style="flex:1; border:none; padding:10px; border-radius:8px; background:transparent; color:#888;"><i class="fa fa-user-plus"></i> SIGN UP</button>
        </div>
        
        <div style="text-align:left; font-size:12px; margin-bottom:5px; color:#aaa;"><i class="fa fa-envelope"></i> Email</div>
        <input type="text" id="u" placeholder="Enter your email">
        
        <div style="text-align:left; font-size:12px; margin-bottom:5px; color:#aaa;"><i class="fa fa-lock"></i> Password</div>
        <input type="password" id="p" placeholder="Enter your password">
        
        <div class="cf-box">
            <div style="display:flex; align-items:center; gap:10px;">
                <i class="fa fa-check-circle" style="color:#00ff88; font-size:20px;"></i>
                <span>Success!</span>
            </div>
            <div style="text-align:right;">
                <img src="https://upload.wikimedia.org/wikipedia/commons/4/4b/Cloudflare_Logo.svg" width="60"><br>
                <small style="color:#666; font-size:8px;">Privacy • Help</small>
            </div>
        </div>
        
        <div style="text-align:center; font-size:10px; color:#00ff88; margin-bottom:10px;">Secure Encrypted Authentication</div>
        <button class="btn-orange" onclick="handleAuth()" id="mainBtn">LOGIN</button>
    </div>
</div>

<div id="app" style="display:none;">
    <div id="homeSec" class="section active">
        <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
            <div><small style="color:#888;">Account Details</small><br><b id="userEmail" style="font-size:12px;">user@mail.com</b></div>
            <button onclick="location.reload()" style="background:#222; border:1px solid #444; color:white; padding:5px 12px; border-radius:5px; font-size:11px;"><i class="fa fa-sign-out-alt"></i> Logout</button>
        </div>
        <div class="card"><img src="1000113658.jpg" style="width:100%; border-radius:10px; border:1px solid var(--orange);"></div>
        <div id="plansList"></div>
    </div>

    <div id="walletSec" class="section">
        <div class="card">
            <h2 style="font-size:18px; margin-top:0;">Payment</h2>
            <div style="text-align:center; color:#888; font-size:12px; margin-bottom:15px;">Scan OR Click QR to Pay</div>
            
            <div style="text-align:center;">
                <img src="1000113660.jpg" style="width:200px; border-radius:15px; border:4px solid white; margin-bottom:15px;">
                <h1 style="font-family: Orbitron; margin: 10px 0;">₹350</h1>
            </div>

            <label style="font-size:11px; color:#888; text-transform:uppercase;">Select Plan for Payment</label>
            <select id="payPlan">
                <option>Starter - ₹350</option>
                <option>VIP - ₹600</option>
            </select>

            <label style="font-size:11px; color:#888; text-transform:uppercase;">Enter UTR Number</label>
            <input type="text" id="payUtr" placeholder="ENTER UTR (12+ CHARACTERS)">
            <p style="text-align:center; font-size:10px; color:#666;">Enter 12-digit UTR/Reference No. after payment</p>
            
            <button class="btn-orange" onclick="submitPayment()">SUBMIT PAYMENT</button>
        </div>
    </div>

    <div id="orderSec" class="section"><div class="card"><h3>Orders</h3><div id="ordersList"></div></div></div>
    <div id="supportSec" class="section"><div class="card"><div id="chatDisplay" style="height:300px; overflow-y:auto;"></div><input type="text" id="supportMsg" placeholder="Message..."><button class="btn-orange" onclick="sendMsg()">SEND</button></div></div>

    <div class="nav-bottom">
        <div class="nav-btn active" onclick="tab('homeSec', this)"><i class="fa fa-layer-group"></i>Home</div>
        <div class="nav-btn" onclick="tab('orderSec', this)"><i class="fa fa-list"></i>History</div>
        <div class="nav-btn" onclick="tab('supportSec', this)"><i class="fa fa-comment-dots"></i>Support</div>
        <div class="nav-btn" onclick="tab('orderSec', this)"><i class="fa fa-box"></i>Orders</div>
        <div class="nav-btn" onclick="tab('walletSec', this)"><i class="fa fa-wallet"></i>Wallet</div>
    </div>
</div>

<script>
    let isLogin = true; let user = null;
    function setAuth(mode) {
        isLogin = mode;
        document.getElementById('btnL').style.background = mode ? 'var(--orange)' : 'transparent';
        document.getElementById('btnL').style.color = mode ? 'white' : '#888';
        document.getElementById('btnS').style.background = !mode ? 'var(--orange)' : 'transparent';
        document.getElementById('btnS').style.color = !mode ? 'white' : '#888';
        document.getElementById('mainBtn').innerText = mode ? 'LOGIN' : 'SIGN UP';
    }
    async function handleAuth() {
        const u = document.getElementById('u').value.trim(); const p = document.getElementById('p').value.trim();
        const path = isLogin ? 'login' : 'signup';
        const res = await fetch(`/api/auth/${path}`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:u, password:p}) });
        const data = await res.json();
        if(data.success) { if(isLogin) { user = data.user; syncUI(); } else { alert("Signup Success!"); setAuth(true); } } else alert(data.msg);
    }
    function syncUI() {
        document.getElementById('authBox').style.display='none'; document.getElementById('app').style.display='block';
        document.getElementById('userEmail').innerText = user.username;
        // ... prices logic remains same ...
    }
    function tab(id, el) { 
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active')); 
        document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('active')); 
        document.getElementById(id).classList.add('active'); el.classList.add('active'); 
    }
    async function submitPayment() {
        const amt = document.getElementById('payPlan').value.split('₹')[1];
        const utr = document.getElementById('payUtr').value;
        if(utr.length < 10) return alert("Invalid UTR");
        await fetch('/api/add-balance', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:user.username, amount:amt, code:utr}) });
        alert("Payment Submitted!");
    }
</script>
</body>
</html>
