<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF AUTOLIKE VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap');
        :root { --bg: #050505; --card: #111111; --accent: #00ff88; --text: #ffffff; --border: #1a1a1a; }
        body { background: var(--bg); color: var(--text); font-family: 'Poppins', sans-serif; margin: 0; padding-bottom: 100px; overflow-x: hidden; }
        .container { padding: 20px; max-width: 500px; margin: auto; }
        
        /* Glass Effect */
        .glass { background: rgba(20, 20, 20, 0.7); backdrop-filter: blur(10px); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .live-tag { font-family: 'Orbitron'; font-size: 10px; color: var(--accent); letter-spacing: 2px; margin-bottom: 10px; display: flex; align-items: center; }
        .live-dot { height: 8px; width: 8px; background: var(--accent); border-radius: 50%; display: inline-block; margin-right: 8px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.5); opacity: 0.5; } 100% { transform: scale(1); opacity: 1; } }

        .btn-buy { width: 100%; padding: 15px; background: var(--accent); color: #000; border: none; border-radius: 12px; font-weight: bold; font-family: 'Orbitron'; cursor: pointer; transition: 0.3s; }
        .btn-buy:hover { box-shadow: 0 0 20px var(--accent); transform: translateY(-2px); }

        /* Navigation */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #111; z-index: 100; }
        .nav-link { color: #444; text-decoration: none; font-size: 10px; text-align: center; }
        .nav-link.active { color: var(--accent); }
        .nav-link i { font-size: 20px; display: block; margin-bottom: 5px; }

        .section { display: none; }
        .section.active { display: block; animation: fadeInUp 0.5s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="authBox" style="height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;">
    <div class="glass" style="width:100%; max-width:350px; text-align:center;">
        <h2 style="font-family:'Orbitron'; color:var(--accent);">SECURE LOGIN</h2>
        <input type="text" id="u" placeholder="Username" style="width:100%; padding:12px; margin:10px 0; background:#000; border:1px solid #222; color:#fff; border-radius:10px;">
        <input type="password" id="p" placeholder="Password" style="width:100%; padding:12px; margin:10px 0; background:#000; border:1px solid #222; color:#fff; border-radius:10px;">
        <button class="btn-buy" onclick="login()">ENTER SYSTEM</button>
        <p onclick="toggleAuth()" style="font-size:12px; margin-top:15px; color:#666;">New? <span style="color:var(--accent)">Register Access</span></p>
    </div>
</div>

<div class="container" id="app" style="display:none;">
    <div class="glass">
        <div class="live-tag"><span class="live-dot"></span> LIVE TRACKING</div>
        <div style="font-size:24px; font-weight:bold;">Today: <span id="c" style="color:var(--accent);">0</span> / 100 <span style="font-size:12px; color:#555;">Likes</span></div>
        <div id="msg" style="font-size:12px; color:var(--accent); margin-top:10px; font-weight:bold;">STATUS: INACTIVE</div>
    </div>

    <div id="dash" class="section active">
        <div id="plansGrid"></div>
        <div class="glass">
            <h4 style="font-family:'Orbitron'; margin:0 0 15px 0;"><i class="fas fa-id-card"></i> MY LIKES INFO</h4>
            <div style="font-size:14px; border-bottom:1px solid #222; padding:10px 0;">ID Name: <span id="idN" style="float:right">---</span></div>
            <div style="font-size:14px; border-bottom:1px solid #222; padding:10px 0;">UID: <span id="idU" style="float:right">---</span></div>
            <div style="font-size:14px; padding:10px 0;">Before Likes: <span style="float:right">0</span></div>
        </div>
    </div>

    <div id="acc" class="section">
        <div class="glass" style="text-align:center;">
            <div style="width:70px; height:70px; background:var(--accent); border-radius:50%; margin:auto; line-height:70px; color:#000; font-size:30px; font-weight:bold;">U</div>
            <h3 id="uName">USER</h3>
            <button onclick="location.reload()" style="background:#200; color:#f44; padding:12px; width:100%; border:1px solid #400; border-radius:10px; font-weight:bold; cursor:pointer;">LOGOUT ACCOUNT</button>
        </div>
    </div>
</div>

<nav class="bottom-nav" id="nav" style="display:none;">
    <a href="javascript:void(0)" class="nav-link active" onclick="tab('dash',this)"><i class="fas fa-bolt"></i>Dashboard</a>
    <a href="javascript:void(0)" class="nav-link" onclick="tab('acc',this)"><i class="fas fa-user-circle"></i>Account</a>
</nav>

<script>
    let curUser = "";
    async function login() {
        const u=document.getElementById('u').value; const p=document.getElementById('p').value;
        const r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
        const d=await r.json();
        if(d.success) showUI(d.user); else alert(d.msg);
    }
    async function showUI(user) {
        curUser=user.username; document.getElementById('authBox').style.display='none';
        document.getElementById('app').style.display='block'; document.getElementById('nav').style.display='flex';
        document.getElementById('uName').innerText = user.username.toUpperCase();
        if(user.status==='active'){
            document.getElementById('msg').innerText="✅ YOUR REQUEST IS APPROVED";
            document.getElementById('idN').innerText=user.username; document.getElementById('idU').innerText=user.uid;
        }
        loadPlans();
    }
    async function loadPlans() {
        const r=await fetch('/api/plans'); const p=await r.json();
        let h=''; p.forEach(x=>{
            h+=`<div class="glass"><div style="display:flex;justify-content:space-between"><h3>${x.days} DAYS</h3><span style="color:var(--accent);font-size:12px">${x.tag}</span></div>
            <p style="color:#666;font-size:12px">Total: ${x.totalLikes} Likes</p>
            <div style="font-size:24px;font-weight:bold;color:var(--accent)">₹${x.price}</div>
            <button class="btn-buy" style="margin-top:15px" onclick="buy('${x.days}')">BUY ACCESS</button></div>`;
        });
        document.getElementById('plansGrid').innerHTML=h;
    }
    function tab(id,el){
        document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(n=>n.classList.remove('active'));
        document.getElementById(id).classList.add('active'); el.classList.add('active');
    }
</script>
</body>
</html>
