<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF AUTOLIKE PRO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap');
        :root { --bg: #050505; --card: #111; --accent: #00ff88; --border: #1a1a1a; }
        body { background: var(--bg); color: #fff; font-family: 'Poppins', sans-serif; margin: 0; padding-bottom: 90px; }
        .container { padding: 20px; max-width: 500px; margin: auto; }
        .glass { background: rgba(20, 20, 20, 0.8); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .live-dot { height: 8px; width: 8px; background: var(--accent); border-radius: 50%; display: inline-block; animation: pulse 1.5s infinite; margin-right: 8px; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.4); opacity: 0.4; } 100% { transform: scale(1); opacity: 1; } }
        .btn-main { width: 100%; padding: 15px; background: var(--accent); color: #000; border: none; border-radius: 12px; font-weight: bold; font-family: 'Orbitron'; cursor: pointer; transition: 0.3s; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #222; color: #fff; border-radius: 10px; box-sizing: border-box; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #111; z-index: 100; }
        .nav-link { color: #444; text-decoration: none; font-size: 10px; text-align: center; }
        .nav-link.active { color: var(--accent); }
        .section { display: none; }
        .section.active { display: block; animation: fadeInUp 0.5s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="authBox" style="height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;">
    <div class="glass" style="width:100%; max-width:350px; text-align:center;">
        <h2 style="font-family:'Orbitron'; color:var(--accent);">ACCESS LOGIN</h2>
        <input type="text" id="u" placeholder="Username">
        <input type="password" id="p" placeholder="Password">
        <button class="btn-main" onclick="login()">PROCEED</button>
        <p onclick="toggleAuth()" style="font-size:12px; margin-top:20px; color:#666;">New? <span style="color:var(--accent)">Create Account</span></p>
    </div>
</div>

<div class="container" id="app" style="display:none;">
    <div class="glass">
        <div style="font-family:'Orbitron'; font-size:10px; color:var(--accent); margin-bottom:10px;"><span class="live-dot"></span> LIVE TRACKING</div>
        <div style="font-size:24px; font-weight:bold;">Today: <span id="dailyCount" style="color:var(--accent);">0</span> / 100</div>
        <div id="statusBadge" style="font-size:11px; margin-top:10px; font-weight:bold; color:orange;">WAITING FOR ACTIVATION</div>
    </div>

    <div id="dash" class="section active">
        <div id="plansGrid"></div>
        <div class="glass">
            <h4 style="font-family:'Orbitron'; margin:0 0 15px 0; color:var(--accent);">MY LIKES INFO</h4>
            <div style="font-size:14px; border-bottom:1px solid #222; padding:8px 0;">ID: <span id="idN" style="float:right">---</span></div>
            <div style="font-size:14px; border-bottom:1px solid #222; padding:8px 0;">UID: <span id="idU" style="float:right">---</span></div>
            <div style="font-size:14px; padding:8px 0;">Status: <span id="idS" style="float:right; color:red;">Inactive</span></div>
        </div>
    </div>

    <div id="acc" class="section">
        <div class="glass" style="text-align:center;">
            <div style="width:70px; height:70px; background:var(--accent); border-radius:50%; margin:auto; line-height:70px; color:#000; font-size:30px; font-weight:bold;">U</div>
            <h3 id="uName">USER</h3>
            <button onclick="location.reload()" style="background:#1a0000; color:red; border:1px solid #400; padding:12px; width:100%; border-radius:10px; font-weight:bold;">LOGOUT</button>
        </div>
    </div>
</div>

<div id="redeemModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:1000; align-items:center; justify-content:center; padding:20px;">
    <div class="glass" style="width:100%; max-width:350px;">
        <h3 id="modalTitle" style="font-family:'Orbitron'; color:var(--accent);">REDEEM</h3>
        <input type="number" id="uidBox" placeholder="FF UID">
        <input type="text" id="codeBox" placeholder="Google Play Redeem Code">
        <button class="btn-main" onclick="submitReq()">SUBMIT APPROVAL</button>
        <p onclick="this.parentElement.parentElement.style.display='none'" style="text-align:center; color:#666; cursor:pointer; margin-top:15px;">Cancel</p>
    </div>
</div>

<nav class="bottom-nav" id="nav" style="display:none;">
    <a href="javascript:void(0)" class="nav-link active" onclick="tab('dash',this)"><i class="fas fa-home"></i><br>Home</a>
    <a href="javascript:void(0)" class="nav-link" onclick="tab('acc',this)"><i class="fas fa-user"></i><br>Account</a>
</nav>

<script>
    let curUser = "";
    async function login() {
        const u=document.getElementById('u').value; const p=document.getElementById('p').value;
        const res = await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
        const data = await res.json();
        if(data.success) showDash(data.user); else alert(data.msg);
    }
    async function showDash(user) {
        curUser=user.username; document.getElementById('authBox').style.display='none';
        document.getElementById('app').style.display='block'; document.getElementById('nav').style.display='flex';
        document.getElementById('uName').innerText = user.username.toUpperCase();
        if(user.status==='active'){
            document.getElementById('statusBadge').innerText="✅ ACCOUNT ACTIVATED"; document.getElementById('statusBadge').style.color="var(--accent)";
            document.getElementById('idN').innerText=user.username; document.getElementById('idU').innerText=user.uid;
            document.getElementById('idS').innerText="Active"; document.getElementById('idS').style.color="var(--accent)";
        }
        loadPlans();
    }
    async function loadPlans() {
        const r = await fetch('/api/plans'); const plans = await r.json();
        let h = ''; plans.forEach(p => {
            h += `<div class="glass"><h3>${p.days} DAYS</h3><p style="color:#666;font-size:12px">${p.tag}</p><div style="font-size:24px;color:var(--accent)">₹${p.price}</div><button class="btn-main" style="margin-top:10px" onclick="openRed('${p.days} Days')">BUY</button></div>`;
        });
        document.getElementById('plansGrid').innerHTML = h;
    }
    function openRed(t){ document.getElementById('modalTitle').innerText=t; document.getElementById('redeemModal').style.display='flex'; }
    async function submitReq(){
        const uid=document.getElementById('uidBox').value; const code=document.getElementById('codeBox').value;
        await fetch('/api/request-active',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:curUser,uid,code})});
        alert("Request Sent!"); location.reload();
    }
    function tab(id,el){ document.querySelectorAll('.section').forEach(s=>s.classList.remove('active')); document.querySelectorAll('.nav-link').forEach(n=>n.classList.remove('active')); document.getElementById(id).classList.add('active'); el.classList.add('active'); }
</script>
</body>
</html>
