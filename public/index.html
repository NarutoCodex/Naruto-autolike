<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF VIP STORE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Orbitron:wght@700&display=swap');
        :root { --bg: #050505; --acc: #00ff88; --card: #111; --border: #222; }
        body { background: var(--bg); color: white; font-family: 'Poppins', sans-serif; margin: 0; padding-bottom: 90px; }
        .container { padding: 15px; max-width: 500px; margin: auto; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 25px; margin-bottom: 15px; position: relative; }
        .btn-main { width: 100%; padding: 14px; background: var(--acc); color: #000; border: none; border-radius: 10px; font-weight: bold; font-family: 'Orbitron'; cursor: pointer; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: #000; border: 1px solid #333; color: white; border-radius: 10px; box-sizing: border-box; }
        .nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #111; z-index: 1000; }
        .nav-item { color: #555; text-align: center; font-size: 11px; flex: 1; cursor: pointer; }
        .nav-item.active { color: var(--acc); }
        .section { display: none; }
        .section.active { display: block; }
        .plan-box { border: 1px solid #222; padding: 15px; border-radius: 12px; margin-top: 10px; background: #080808; border-left: 3px solid var(--acc); }
        .badge { background: #222; color: var(--acc); font-size: 10px; padding: 3px 8px; border-radius: 5px; border: 1px solid #333; display: inline-block; margin: 5px 5px 0 0; }
        h3 { font-family: 'Orbitron'; font-size: 14px; margin: 20px 0 10px 0; color: var(--acc); }
    </style>
</head>
<body>

<div id="authBox" style="height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;">
    <div class="card" style="width:100%; max-width:350px; text-align:center;">
        <h2 id="authT" style="color:var(--acc); font-family:'Orbitron';">LOGIN</h2>
        <input type="text" id="u" placeholder="Username">
        <input type="password" id="p" placeholder="Password">
        <button class="btn-main" onclick="handleAuth()">PROCEED</button>
        <p onclick="toggleAuth()" id="toggleT" style="font-size:12px; margin-top:15px; color:#666; cursor:pointer;">New? <span style="color:var(--acc)">Create Account</span></p>
    </div>
</div>

<div class="container" id="app" style="display:none;">
    <div id="dashSec" class="section active">
        <div class="card" style="border-left: 5px solid var(--acc); padding: 15px;">
            <div style="font-size:10px; color:var(--acc)">● MY BALANCE: ₹<span id="balDisplay">0</span></div>
        </div>

        <h3>LIKE PLANS</h3><div id="likePlansList"></div>
        <h3>AUTO VISIT PLANS</h3><div id="visitPlansList"></div>

        <div class="card" style="margin-top:30px; border-top: 2px solid #222;">
            <h3 style="margin:0 0 10px 0; color:white; font-family:'Orbitron';">ACTIVE STATUS</h3>
            <div id="activePlansList"></div>
        </div>
    </div>

    <div id="balSec" class="section"><h3>WALLET</h3><div class="card"><input type="number" id="addAmt" placeholder="Amount"><input type="text" id="addCode" placeholder="Redeem Code"><button class="btn-main" onclick="submitBalance()">ADD BALANCE</button></div></div>
    <div id="histSec" class="section"><h3>HISTORY</h3><div id="historyList"></div></div>
    <div id="accSec" class="section"><div class="card" style="text-align:center;"><h3 id="userD" style="color:white">USER</h3><button class="btn-main" style="background:#200; color:#f44;" onclick="location.reload()">LOGOUT</button></div></div>
</div>

<nav class="nav" id="navBar" style="display:none;">
    <div class="nav-item active" onclick="tab('dashSec', this)"><i class="fa fa-home"></i><br>Dash</div>
    <div class="nav-item" onclick="tab('histSec', this)"><i class="fa fa-history"></i><br>History</div>
    <div class="nav-item" onclick="tab('balSec', this)"><i class="fa fa-wallet"></i><br>Wallet</div>
    <div class="nav-item" onclick="tab('accSec', this)"><i class="fa fa-user-circle"></i><br>Acc</div>
</nav>

<script>
    let isL = true; let curU = ""; let curBal = 0; let curPass = "";
    const priceList = [{d:28,p:90},{d:60,p:180},{d:90,p:250},{d:120,p:320}];

    function toggleAuth() { isL = !isL; document.getElementById('authT').innerText = isL ? "LOGIN" : "SIGNUP"; }

    async function handleAuth() {
        const u = document.getElementById('u').value.trim(); const p = document.getElementById('p').value.trim();
        const res = await fetch(`/api/auth/${isL?'login':'signup'}`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:u, password:p}) });
        const data = await res.json();
        if(data.success) { if(isL) { curU=u; curPass=p; showUI(data.user); } else { alert("Account Created!"); toggleAuth(); } } else alert(data.msg);
    }

    function showUI(user) {
        document.getElementById('authBox').style.display='none'; document.getElementById('app').style.display='block'; document.getElementById('navBar').style.display='flex';
        document.getElementById('balDisplay').innerText = user.balance;
        document.getElementById('userD').innerText = user.username.toUpperCase();
        curBal = user.balance;

        let lH = ''; let vH = '';
        priceList.forEach(p => {
            lH += `<div class="card"><h3>${p.d} DAYS LIKE <span style="float:right; color:var(--acc)">₹${p.p}</span></h3><button class="btn-main" onclick="buyPlan('like', ${p.p}, ${p.d})">BUY PLAN</button></div>`;
            vH += `<div class="card"><h3>${p.d} DAYS VISIT <span style="float:right; color:var(--acc)">₹${p.p}</span></h3><button class="btn-main" onclick="buyPlan('visit', ${p.p}, ${p.d})">BUY PLAN</button></div>`;
        });
        document.getElementById('likePlansList').innerHTML = lH;
        document.getElementById('visitPlansList').innerHTML = vH;

        let activeH = ''; let historyH = '';
        if(user.activePlans && user.activePlans.length > 0) {
            user.activePlans.forEach((plan, i) => {
                const diff = Math.ceil((new Date(plan.expiryDate) - new Date()) / (1000 * 60 * 60 * 24));
                activeH += `<div class="plan-box"><b>${plan.type.toUpperCase()} PLAN ${i+1}</b><br><span class="badge">UID: ${plan.uid}</span><span class="badge">DONE: ${plan.totalDone}</span><div style="font-size:10px; color:#888; margin-top:5px;">${diff} Days Left</div></div>`;
                historyH += `<div class="card" style="padding:15px; border:1px solid #333;"><b>${plan.type.toUpperCase()}</b> | UID: ${plan.uid}<br><small>Expires: ${new Date(plan.expiryDate).toLocaleDateString()}</small></div>`;
            });
            document.getElementById('activePlansList').innerHTML = activeH;
            document.getElementById('historyList').innerHTML = historyH;
        } else {
            document.getElementById('activePlansList').innerHTML = '<p style="text-align:center; font-size:12px; color:#666;">No active plans</p>';
        }
    }

    async function buyPlan(type, price, days) {
        if(curBal < price) return alert("Insufficient Balance!");
        const uid = prompt("FF UID:"); if(!uid) return;
        const region = prompt("Region (ind/bd/sg):", "ind"); if(!region) return;
        
        const res = await fetch('/api/buy-plan', { 
            method:'POST', 
            headers:{'Content-Type':'application/json'}, 
            body:JSON.stringify({username:curU, type, price, days, uid, region}) 
        });
        const d = await res.json(); 
        
        if(d.success) {
            alert(d.msg);
            // Re-fetch data instantly after purchase to sync UI
            const refreshRes = await fetch('/api/auth/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:curU, password:curPass}) });
            const refreshData = await refreshRes.json();
            if(refreshData.success) showUI(refreshData.user);
        } else {
            alert(d.msg);
        }
    }

    async function submitBalance() {
        await fetch('/api/add-balance', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:curU, amount:document.getElementById('addAmt').value, code:document.getElementById('addCode').value}) });
        alert("Sent!"); location.reload();
    }
    function tab(id, el) { document.querySelectorAll('.section').forEach(s => s.classList.remove('active')); document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); document.getElementById(id).classList.add('active'); el.classList.add('active'); }
</script>
</body>
</html>
