<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF AUTOLIKE PRO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron&family=Poppins&display=swap');
        :root { --bg: #050505; --accent: #00ff88; --card: #121212; }
        body { background: var(--bg); color: white; font-family: 'Poppins', sans-serif; margin: 0; padding-bottom: 80px; }
        .card { background: var(--card); border: 1px solid #222; border-radius: 20px; padding: 20px; margin: 15px; }
        .btn-main { width: 100%; padding: 15px; background: var(--accent); color: #000; border: none; border-radius: 12px; font-weight: bold; font-family: 'Orbitron'; cursor: pointer; }
        input { width: 100%; padding: 14px; margin: 10px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 12px; box-sizing: border-box; }
        .nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #222; }
    </style>
</head>
<body>

<div id="authBox" style="height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;">
    <div class="card" style="width:100%; max-width:380px; text-align:center;">
        <h2 id="authTitle" style="color:var(--accent); font-family:'Orbitron';">LOGIN</h2>
        <input type="text" id="user" placeholder="Username">
        <input type="password" id="pass" placeholder="Password">
        <button class="btn-main" onclick="handleAuth()">PROCEED</button>
        <p onclick="toggleAuth()" id="toggleText" style="font-size:12px; margin-top:15px; cursor:pointer; color:#666;">New? <span style="color:var(--accent)">Signup</span></p>
    </div>
</div>

<div id="mainApp" style="display:none;" class="container">
    <div class="card" style="border-left: 5px solid var(--accent);">
        <div style="font-size:10px;"><span style="color:var(--accent)">●</span> LIVE STATUS</div>
        <div id="statusMsg" style="font-size:14px; font-weight:bold; margin-top:10px; color:orange;">WAITING FOR APPROVAL...</div>
    </div>
    <div id="plansContainer"></div>
    <div class="card">
        <h4 style="color:var(--accent); margin:0 0 10px 0;">MY LIKES INFO</h4>
        <div id="userStats" style="font-size:13px; line-height:2;">
            Name: <span id="idName" style="float:right">---</span><br>
            UID: <span id="idUid" style="float:right">---</span><br>
            Likes: <span id="idLikes" style="float:right">0</span>
        </div>
    </div>
</div>

<script>
    let isLogin = true;
    let currentUser = "";

    function toggleAuth() {
        isLogin = !isLogin;
        document.getElementById('authTitle').innerText = isLogin ? "LOGIN" : "SIGNUP";
        document.getElementById('toggleText').innerHTML = isLogin ? 'New? <span style="color:var(--accent)">Signup</span>' : 'Have account? <span style="color:var(--accent)">Login</span>';
    }

    async function handleAuth() {
        const u = document.getElementById('user').value.trim();
        const p = document.getElementById('pass').value.trim();
        if(!u || !p) return alert("Fill all fields!");

        const path = isLogin ? 'login' : 'signup';
        try {
            const res = await fetch(`/api/auth/${path}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ username: u, password: p })
            });
            const data = await res.json();
            if(data.success) {
                if(isLogin) {
                    currentUser = data.user.username;
                    showDash(data.user);
                } else {
                    alert("Account Created! Login Now.");
                    location.reload();
                }
            } else { alert(data.msg); }
        } catch (e) { alert("Check Internet or Vercel Deployment!"); }
    }

    async function showDash(user) {
        document.getElementById('authBox').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        
        const msg = document.getElementById('statusMsg');
        if(user.status === 'active') {
            msg.innerText = "✅ YOUR REQUEST HAS BEEN APPROVED";
            msg.style.color = "#00ff88";
            document.getElementById('idName').innerText = user.username;
            document.getElementById('idUid').innerText = user.uid;
            document.getElementById('idLikes').innerText = user.totalLikes || 0;
        }
        
        const pRes = await fetch('/api/plans');
        const plans = await pRes.json();
        let h = '';
        plans.forEach(p => {
            h += `<div class="card"><h3>${p.days} DAYS VIP</h3><div style="font-size:24px; color:var(--accent); font-weight:bold;">₹${p.price}</div><button class="btn-main" style="margin-top:10px" onclick="alert('Submit UID in My Likes section')">BUY NOW</button></div>`;
        });
        document.getElementById('plansContainer').innerHTML = h;
    }
</script>
</body>
</html>
