<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF VIP STORE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #080808; --acc: #00ff88; --card: #121212; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding-bottom: 70px; }
        .container { padding: 15px; max-width: 500px; margin: auto; }
        .card { background: var(--card); border: 1px solid #222; border-radius: 15px; padding: 20px; margin-bottom: 15px; }
        .btn { width: 100%; padding: 12px; background: var(--acc); color: black; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: #000; border: 1px solid #333; color: white; border-radius: 8px; box-sizing: border-box; }
        .nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #222; }
        .nav-item { color: #555; text-decoration: none; text-align: center; font-size: 11px; cursor: pointer; }
        .nav-item.active { color: var(--acc); }
        .section { display: none; }
        .section.active { display: block; }
    </style>
</head>
<body>

<div id="authBox" style="height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;">
    <div class="card" style="width:100%; text-align:center;">
        <h2 id="authT">LOGIN</h2>
        <input type="text" id="u" placeholder="Username">
        <input type="password" id="p" placeholder="Password">
        <button class="btn" onclick="handleAuth()">PROCEED</button>
        <p onclick="toggleAuth()" style="font-size:12px; margin-top:10px; cursor:pointer;">New? <span style="color:var(--acc)">Create Account</span></p>
    </div>
</div>

<div class="container" id="app" style="display:none;">
    <div id="dashSec" class="section active">
        <div class="card" style="border-left: 4px solid var(--acc);">
            <small>LIVE TRACKING</small>
            <h2 id="status">INACTIVE</h2>
        </div>
        <div id="plansList"></div>
    </div>

    <div id="histSec" class="section">
        <h3>History</h3>
        <div class="card">No transactions yet.</div>
    </div>

    <div id="accSec" class="section">
        <h3>My Account</h3>
        <div class="card" style="text-align:center;">
            <h4 id="userN">USERNAME</h4>
            <button class="btn" style="background:red; color:white;" onclick="location.reload()">LOGOUT</button>
        </div>
    </div>
</div>

<div class="nav" id="navBar" style="display:none;">
    <div class="nav-item active" onclick="tab('dashSec', this)"><i class="fa fa-home"></i><br>Dashboard</div>
    <div class="nav-item" onclick="tab('histSec', this)"><i class="fa fa-history"></i><br>History</div>
    <div class="nav-item" onclick="tab('accSec', this)"><i class="fa fa-user"></i><br>Account</div>
</div>

<script>
    let isL = true; let curU = "";
    function toggleAuth() { isL = !isL; document.getElementById('authT').innerText = isL ? "LOGIN" : "SIGNUP"; }

    async function handleAuth() {
        const u = document.getElementById('u').value.trim();
        const p = document.getElementById('p').value.trim();
        const path = isL ? 'login' : 'signup';
        const res = await fetch(`/api/auth/${path}`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:u, password:p}) });
        const data = await res.json();
        if(data.success) { if(isL) showUI(data.user); else alert("Account Created!"); } else alert(data.msg);
    }

    function showUI(user) {
        document.getElementById('authBox').style.display='none';
        document.getElementById('app').style.display='block';
        document.getElementById('navBar').style.display='flex';
        document.getElementById('userN').innerText = user.username;
        if(user.status === 'active') document.getElementById('status').innerText = "ACTIVE ✅";
        loadPlans();
    }

    async function loadPlans() {
        const res = await fetch('/api/plans'); const plans = await res.json();
        let h = ''; plans.forEach(p => {
            h += `<div class="card"><h3>${p.days} Days VIP</h3><p>₹${p.price}</p><button class="btn">BUY NOW</button></div>`;
        });
        document.getElementById('plansList').innerHTML = h;
    }

    function tab(id, el) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active'); el.classList.add('active');
    }
</script>
</body>
</html>
