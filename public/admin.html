<!DOCTYPE html>
<html>
<head><title>ADMIN PANEL</title></head>
<body style="background:#000; color:#00ff88; font-family:sans-serif; padding:20px;">
    <h2>MASTER ADMIN</h2>
    <input type="password" id="adminKey" placeholder="Admin Secret Key" style="width:100%; padding:10px; background:#111; color:#fff; border:1px solid #333;">
    <button onclick="loadUsers()" style="width:100%; padding:10px; background:#00ff88; font-weight:bold;">LOAD DATA</button>

    <div id="userList" style="margin-top:20px;"></div>

    <script>
        async function loadUsers() {
            const key = document.getElementById('adminKey').value;
            const res = await fetch('/api/admin/all', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ adminKey: key })
            });
            const users = await res.json();
            let html = '';
            users.forEach(u => {
                html += `<div style="border:1px solid #333; padding:15px; margin-bottom:10px;">
                    User: ${u.username} | UID: ${u.uid} | Status: ${u.status} | Code: ${u.redeemCode}<br>
                    <button onclick="update('${u._id}','active')">Approve</button>
                    <button onclick="update('${u._id}','rejected')" style="background:red; color:white;">Reject</button>
                </div>`;
            });
            document.getElementById('userList').innerHTML = html;
        }

        async function update(id, status) {
            const key = document.getElementById('adminKey').value;
            const days = status === 'active' ? prompt("Enter Days:", "30") : null;
            await fetch('/api/admin/update-user', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ adminKey: key, id, status, days })
            });
            alert("Done!"); loadUsers();
        }
    </script>
</body>
</html>
