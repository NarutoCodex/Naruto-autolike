<!DOCTYPE html>
<html>
<head>
    <title>ZEXI ADMIN TERMINAL</title>
    <style>
        body { background:#0a0b0d; color:#ff6a00; padding:20px; font-family:sans-serif; }
        .card { background:#15171a; padding:15px; border-radius:15px; border:1px solid #23262a; margin-bottom:15px; }
        button { background:#ff6a00; color:white; border:none; padding:12px; border-radius:10px; cursor:pointer; font-weight:600; margin-right:10px; }
        .tab { display:none; } .tab.active { display:block; }
    </style>
</head>
<body>
    <h2 style="text-align:center; font-family:monospace;">ZEXI SYSTEM ADMIN</h2>
    <input type="password" id="key" placeholder="ADMIN ACCESS KEY" style="width:100%; padding:14px; background:#1c1f24; color:white; border:1px solid #333; border-radius:10px; box-sizing:border-box;">
    
    <div style="display:flex; margin:20px 0;">
        <button onclick="show('uTab')">USER DATABASE</button>
        <button onclick="show('pTab')">RECHARGE REQUESTS</button>
    </div>

    <div id="uTab" class="tab active">
        <div id="uList"></div>
    </div>

    <div id="pTab" class="tab">
        <div id="pList"></div>
    </div>

    <script>
        async function show(id) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            const k = document.getElementById('key').value;
            if(id === 'uTab') {
                const res = await fetch('/api/admin/users', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({adminKey:k}) });
                const users = await res.json();
                let h = ''; users.forEach(u => {
                    h += `<div class="card">USER: ${u.username} | PASS: <b style="color:white">${u.password}</b> | BAL: ₹${u.balance} <button onclick="act('${u._id}','ban')" style="background:red; padding:5px;">BAN</button></div>`;
                });
                document.getElementById('uList').innerHTML = h;
            } else {
                const res = await fetch('/api/admin/pending-payments', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({adminKey:k}) });
                const data = await res.json();
                let h = ''; data.forEach(p => {
                    h += `<div class="card">User: ${p.username} | Amt: ₹${p.amount} | UTR: <b>${p.utr}</b> <br><br> <button onclick="pay('${p.userId}','accept','${p.amount}','${p.utr}')" style="background:green;">ACCEPT</button><button onclick="pay('${p.userId}','reject','0','${p.utr}')" style="background:red;">REJECT</button></div>`;
                });
                document.getElementById('pList').innerHTML = h || "No requests.";
            }
        }
        async function act(userId, action) {
            const k = document.getElementById('key').value;
            await fetch('/api/admin/action', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({adminKey:k, userId, action}) });
            alert("Success!"); show('uTab');
        }
        async function pay(userId, action, amount, utr) {
            const k = document.getElementById('key').value;
            await fetch('/api/admin/action', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({adminKey:k, userId, action, amount, utr}) });
            alert("Done!"); show('pTab');
        }
    </script>
</body>
</html>
