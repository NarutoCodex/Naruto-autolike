<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MASTER ADMIN | BALANCE PANEL</title>
    <style>
        body { background: #000; color: #00ff88; font-family: sans-serif; padding: 20px; }
        .card { background: #111; border: 1px solid #222; padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: white; border-radius: 8px; box-sizing: border-box; }
        button { padding: 10px 20px; cursor: pointer; font-weight: bold; border-radius: 5px; border: none; background: #00ff88; color: #000; width: 100%; }
        .item { border: 1px solid #222; padding: 15px; border-radius: 10px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🔑 ADMIN ACCESS</h2>
        <input type="password" id="key" placeholder="Enter Admin Secret Key">
        <button onclick="loadRequests()">FETCH BALANCE REQUESTS</button>
    </div>

    <div id="list"></div>

    <script>
        async function loadRequests() {
            const k = document.getElementById('key').value;
            const res = await fetch('/api/admin/all', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ adminKey: k })
            });
            const users = await res.json();
            let h = '';
            users.forEach(u => {
                h += `<div class="card">
                    <p>User: <b>${u.username}</b></p>
                    <p>Amount: ₹${u.pendingBalance}</p>
                    <p>Code: <span style="color:yellow">${u.redeemCode}</span></p>
                    <button onclick="approve('${u._id}')">APPROVE BALANCE</button>
                </div>`;
            });
            document.getElementById('list').innerHTML = h || "No requests.";
        }

        async function approve(id) {
            const k = document.getElementById('key').value;
            await fetch('/api/admin/approve-balance', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ adminKey: k, id: id })
            });
            alert("Balance Approved!");
            loadRequests();
        }
    </script>
</body>
</html>
