<!DOCTYPE html>
<html>
<body style="background:#0a0b0d; color:#ff6a00; padding:20px; font-family:sans-serif;">
    <h2 style="font-family:Orbitron; text-align:center;">ZEXI ADMIN TERMINAL</h2>
    <input type="password" id="key" placeholder="ADMIN KEY" style="width:100%; padding:10px; background:#111; color:white;">
    <button onclick="load()" style="width:100%; background:#ff6a00; border:none; padding:10px; margin:10px 0;">LOAD TERMINAL</button>
    <div id="adminList"></div>

    <script>
        async function load() {
            const k = document.getElementById('key').value;
            const res = await fetch('/api/admin/all-users', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({adminKey:k}) });
            const users = await res.json();
            
            // --- USERS SECTION (Password + Ban) ---
            let h = '<h3>1. USERS TERMINAL</h3>';
            users.forEach(u => {
                h += `<div style="border:1px solid #333; padding:15px; margin-bottom:10px; background:#15171a;">
                    <b>${u.username}</b> (Pass: <span style="color:white;">${u.password}</span>) | Bal: ₹${u.balance} 
                    <button onclick="act('${u._id}', 'ban')" style="background:red; color:white;">BAN USER</button>
                </div>`;
            });

            // --- PAYMENTS SECTION (UTR + Amount) ---
            h += '<h3>2. PAYMENT REQUESTS</h3>';
            users.forEach(u => {
                h += `<div style="border:1px solid #333; padding:15px; margin-bottom:10px; background:#15171a;">
                    <b>User: ${u.username}</b> | UTR: ${u.pendingPayments.map(p=>p.utr).join(', ')}<br>
                    <button onclick="approve('${u._id}')" style="background:green; color:white;">Approve Payment</button>
                </div>`;
            });
            
            // --- PRICES SECTION ---
            h += '<h3>3. PRICE SETTINGS</h3>';
            h += `<div style="border:1px solid #333; padding:15px; background:#15171a;">
                <button onclick="setPricePrompt('p30')" style="background:#00e5ff; color:black;">Set 30 Days Price</button>
                <button onclick="setPricePrompt('p60')" style="background:#00e5ff; color:black;">Set 60 Days Price</button>
                <button onclick="setPricePrompt('p90')" style="background:#00e5ff; color:black;">Set 90 Days Price</button>
                <button onclick="setPricePrompt('p120')" style="background:#00e5ff; color:black;">Set 120 Days Price</button>
            </div>`;

            document.getElementById('adminList').innerHTML = h;
        }

        async function approve(id) {
            const amt = prompt("Amount to Add?");
            const k = document.getElementById('key').value;
            await fetch('/api/admin/action', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({adminKey:k, userId:id, action:'approve', amount:amt}) });
            alert("Protocol Approved!"); load();
        }

        async function setPricePrompt(key) {
            const pr = prompt("Enter New Price:");
            const k = document.getElementById('key').value;
            await fetch('/api/admin/action', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({adminKey:k, action:'setPrice', planKey:key, price:pr}) });
            alert("Price Protocol Updated!"); load();
        }
        
        async function act(id, type) {
            const k = document.getElementById('key').value;
            await fetch('/api/admin/action', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({adminKey:k, userId:id, action:type}) });
            alert("Done!"); load();
        }
    </script>
</body>
</html>
