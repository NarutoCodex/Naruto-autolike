<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN PANEL | FF AUTOLIKE</title>
    <style>
        :root { --primary: #2f81f7; --bg: #0d1117; --card: #161b22; --text: #c9d1d9; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, sans-serif; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        .card { background: var(--card); border: 1px solid #30363d; border-radius: 12px; padding: 20px; margin-bottom: 20px; overflow-x: auto; }
        h2 { color: var(--primary); border-bottom: 1px solid #30363d; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; min-width: 600px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #30363d; font-size: 14px; }
        th { color: #8b949e; }
        input { background: #0d1117; border: 1px solid #30363d; color: white; padding: 8px; border-radius: 5px; width: 100%; box-sizing: border-box; }
        .btn-load { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-bottom: 20px; }
        .btn-approve { background: #238636; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; }
        .status-pending { color: #e3b341; font-weight: bold; }
        .status-active { color: #3fb950; font-weight: bold; }
        .pass-text { color: #ff9100; font-family: monospace; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>FF AUTOLIKE - Master Admin Control</h2>

    <div class="card">
        <label>Enter Admin Secret Key:</label>
        <input type="password" id="adminKey" placeholder="Enter Key to access data" style="margin: 10px 0;">
        <button class="btn-load" onclick="loadData()">LOAD USERS & REQUESTS</button>
    </div>

    <div class="card">
        <h3>All Registered Users (Passwords)</h3>
        <table>
            <thead>
                <tr>
                    <th>Username</th>
                    <th>Password</th>
                    <th>Email</th>
                    <th>UID</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="userList">
                <tr><td colspan="5" style="text-align:center;">Click Load Users to see data</td></tr>
            </tbody>
        </table>
    </div>

    <div class="card" style="border-top: 4px solid #e3b341;">
        <h3>Pending Activation Requests</h3>
        <table>
            <thead>
                <tr>
                    <th>UID</th>
                    <th>Code / Trans ID</th>
                    <th>Days to Add</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="pendingList">
                </tbody>
        </table>
    </div>
</div>

<script>
    async function loadData() {
        const key = document.getElementById('adminKey').value;
        if(!key) return alert("Enter Admin Key!");

        try {
            const res = await fetch('/api/admin/all', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ adminKey: key })
            });
            
            if(!res.ok) throw new Error("Wrong Admin Key");
            
            const users = await res.json();
            
            // 1. Fill Full User Table
            let userHtml = '';
            let pendingHtml = '';

            users.forEach(u => {
                userHtml += `
                <tr>
                    <td>${u.username}</td>
                    <td class="pass-text">${u.password}</td>
                    <td>${u.email || 'N/A'}</td>
                    <td>${u.uid || '---'}</td>
                    <td class="status-${u.status}">${u.status.toUpperCase()}</td>
                </tr>`;

                if(u.status === 'pending') {
                    pendingHtml += `
                    <tr>
                        <td>${u.uid}</td>
                        <td style="color:#2f81f7;">${u.logs[0]?.msg || 'Redeem'}</td>
                        <td><input type="number" id="days-${u.uid}" value="30" style="width:60px"></td>
                        <td><button class="btn-approve" onclick="approve('${u.uid}')">APPROVE</button></td>
                    </tr>`;
                }
            });

            document.getElementById('userList').innerHTML = userHtml || "<tr><td colspan='5'>No users found</td></tr>";
            document.getElementById('pendingList').innerHTML = pendingHtml || "<tr><td colspan='4' style='text-align:center;'>No pending requests</td></tr>";

        } catch (err) {
            alert("Error: " + err.message);
        }
    }

    async function approve(uid) {
        const key = document.getElementById('adminKey').value;
        const days = document.getElementById(`days-${uid}`).value;

        const res = await fetch('/api/admin/approve', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ adminKey: key, uid, days })
        });
        
        const data = await res.json();
        alert(data.msg);
        loadData(); // Refresh list
    }
</script>

</body>
</html>
