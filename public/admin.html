<!DOCTYPE html>
<html>
<head>
    <title>ZEXI ADMIN TERMINAL</title>
    <style>
        body { background:#0a0b0d; color:#ff6a00; padding:20px; font-family:sans-serif; }
        .card { background:#15171a; padding:15px; border-radius:12px; border:1px solid #23262a; margin-bottom:15px; }
        input { width:100%; padding:12px; margin:5px 0; background:#1c1f24; border:1px solid #333; color:white; border-radius:8px; }
        button { background:#ff6a00; color:white; border:none; padding:10px 15px; border-radius:6px; cursor:pointer; font-weight:600; }
        .ban-btn { background:red; } .app-btn { background:green; }
    </style>
</head>
<body>
    <h2>ZEXI ADMIN TERMINAL</h2>
    <input type="password" id="key" placeholder="ADMIN ACCESS KEY">
    <div style="display:flex; gap:10px; margin:15px 0;">
        <button onclick="loadUsers()" style="flex:1;">LOAD USERS & CHATS</button>
        <button onclick="setPrice()" style="flex:1; background:#00e5ff; color:black;">EDIT PLAN PRICES</button>
    </div>
    <div id="adminList"></div>

    <script>
        async function loadUsers() {
            const k = document.getElementById('key').value;
            const res = await fetch('/api/admin/users', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({adminKey:k}) });
            const users = await res.json();
            let h = '';
            users.forEach(u => {
                h += `<div class="card">
                    <b style="color:#00ff88; font-size:16px;">${u.username}</b> | Password: <b style="color:white;">${u.password}</b><br>
                    Balance: ₹${u.balance} | <button onclick="act('${u._id}', 'ban')" class="ban-btn">BAN USER</button>
                    <hr style="border-color:#222;">
                    <button onclick="approve('${u._id}')" class="app-btn">Approve Payment Request</button>
                    <hr style="border-color:#222;">
                    <div style="color:#888; font-size:12px;">Last Msg: ${u.messages.length ? u.messages[u.messages.length-1].text : 'No Chat'}</div>
                    <input type="text" id="rep-${u._id}" placeholder="Reply to support...">
                    <button onclick="reply('${u._id}')">SEND REPLY</button>
                </div>`;
            });
            document.getElementById('adminList').innerHTML = h;
        }

        async function approve(id) {
            const k = document.getElementById('key').value;
            const amt = prompt("Enter Amount to Add:");
            await fetch('/api/admin/action', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({adminKey:k, userId:id, action:'approve', amount:amt}) });
            alert("Balance Approved!"); loadUsers();
        }

        async function setPrice() {
            const k = document.getElementById('key').value;
            const plan = prompt("Which plan? (p30, p60, p90, p120)");
            const price = prompt("Enter New Price:");
            await fetch('/api/admin/action', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({adminKey:k, action:'setPrice', planKey:plan, price:price}) });
            alert("Price Updated!");
        }

        async function reply(id) {
            const k = document.getElementById('key').value;
            const text = document.getElementById('rep-'+id).value;
            await fetch('/api/admin/action', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({adminKey:k, userId:id, action:'reply', text:text}) });
            alert("Replied!"); loadUsers();
        }

        async function act(id, type) {
            const k = document.getElementById('key').value;
            await fetch('/api/admin/action', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({adminKey:k, userId:id, action:type}) });
            alert("Success!"); loadUsers();
        }
    </script>
</body>
</html>
