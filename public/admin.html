<!DOCTYPE html>
<html>
<head>
    <title>ZEXI ADMIN - OVERVIEW</title>
    <style>
        body { background:#0a0b0d; color:white; font-family:sans-serif; padding:20px; }
        .overview-grid { display:grid; grid-template-columns: repeat(3, 1fr); gap:15px; margin-bottom:30px; }
        .stat-card { background:#15171a; padding:20px; border-radius:10px; border:1px solid #23262a; }
        .stat-card h2 { color:#ff6a00; margin:0; }
        table { width:100%; border-collapse:collapse; background:#15171a; border-radius:10px; }
        th, td { text-align:left; padding:15px; border-bottom:1px solid #23262a; }
        .btn-ban { background:red; color:white; border:none; padding:5px 10px; border-radius:5px; }
    </style>
</head>
<body>
    <h1>Overview</h1>
    <div class="overview-grid">
        <div class="stat-card"><span>UNIQUE USERS</span><h2 id="uUsers">0</h2></div>
        <div class="stat-card"><span>TOTAL TRANSACTIONS</span><h2 id="tTrans">0</h2></div>
        <div class="stat-card"><span>VERIFIED REVENUE</span><h2 id="vRev">₹0</h2></div>
    </div>

    <h3>User Management</h3>
    <table>
        <thead><tr><th>EMAIL</th><th>WALLET (₹)</th><th>STATUS</th><th>ACTIONS</th></tr></thead>
        <tbody id="userList"></tbody>
    </table>

    <script>
        async function loadAdmin() {
            const key = prompt("Admin Key:");
            const res = await fetch('/api/admin/stats', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({adminKey:key}) });
            const data = await res.json();
            document.getElementById('uUsers').innerText = data.uniqueUsers;
            document.getElementById('vRev').innerText = '₹' + data.totalRevenue;
            
            let h = '';
            data.users.forEach(u => {
                h += `<tr>
                    <td>${u.username}</td>
                    <td>${u.balance}</td>
                    <td style="color:green">ACT</td>
                    <td><button class="btn-ban">Ban</button></td>
                </tr>`;
            });
            document.getElementById('userList').innerHTML = h;
        }
        loadAdmin();
    </script>
</body>
</html>
