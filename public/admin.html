<!DOCTYPE html>
<html>
<body style="background:#000; color:#00ff88; padding:20px; font-family:sans-serif;">
    <h2>MASTER ADMIN</h2>
    <input type="password" id="key" placeholder="Admin Secret Key" style="width:100%; padding:10px; margin-bottom:20px;">
    <button onclick="loadPending()" style="width:100%; padding:10px; background:#00ff88;">LOAD REQUESTS</button>

    <div id="list" style="margin-top:20px;"></div>

    <script>
        async function loadPending() {
            const k = document.getElementById('key').value;
            const res = await fetch('/api/admin/all', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({adminKey:k}) });
            const users = await res.json();
            let h = '<h3>Pending Approvals</h3>';
            users.filter(u => u.status === 'pending').forEach(u => {
                h += `<div style="border:1px solid #333; padding:15px; margin-bottom:10px; border-radius:10px;">
                    User: <b>${u.username}</b><br>
                    UID: ${u.uid} | Region: ${u.region}<br>
                    Redeem Code: <span style="color:yellow">${u.redeemCode}</span><br><br>
                    <button onclick="approve('${u._id}')" style="background:green; color:white; border:none; padding:8px 20px; border-radius:5px;">APPROVE NOW</button>
                </div>`;
            });
            document.getElementById('list').innerHTML = h || "No pending requests.";
        }

        async function approve(id) {
            const k = document.getElementById('key').value;
            await fetch('/api/admin/approve-user', { 
                method:'POST', 
                headers:{'Content-Type':'application/json'}, 
                body:JSON.stringify({adminKey:k, id}) 
            });
            alert("User Activated!"); loadPending();
        }
    </script>
</body>
</html>
