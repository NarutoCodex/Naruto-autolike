<!DOCTYPE html>
<html>
<body style="background:#000; color:#00ff88; padding:20px; font-family:sans-serif;">
    <h2>ADMIN: BALANCE APPROVAL</h2>
    <input type="password" id="key" placeholder="Admin Key" style="width:100%; padding:10px; background:#111; color:white; border:1px solid #333;">
    <button onclick="load()" style="width:100%; padding:10px; background:#00ff88; margin-top:10px; cursor:pointer;">FETCH REQUESTS</button>
    <div id="list" style="margin-top:20px;"></div>
    <script>
        async function load() {
            const k = document.getElementById('key').value;
            const res = await fetch('/api/admin/all', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({adminKey:k}) });
            const users = await res.json();
            let h = '';
            users.forEach(u => {
                h += `<div style="border:1px solid #333; padding:15px; margin-bottom:10px;">
                    User: ${u.username} | Amt: ₹${u.pendingBalance} | Code: ${u.redeemCode}
                    <button onclick="app('${u._id}')" style="background:green; color:white; border:none; padding:5px 10px; margin-left:10px; cursor:pointer;">APPROVE</button>
                </div>`;
            });
            document.getElementById('list').innerHTML = h || "No requests.";
        }
        async function app(id) {
            const k = document.getElementById('key').value;
            await fetch('/api/admin/approve-balance', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({adminKey:k, id}) });
            alert("Balance Added!"); load();
        }
    </script>
</body>
</html>
