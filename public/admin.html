<!DOCTYPE html>
<html>
<body style="background:#0a0b0d; color:#ff6a00; padding:20px; font-family:sans-serif;">
    <h2 style="font-family:Orbitron">ZEXI ADMIN TERMINAL</h2>
    <input type="password" id="key" placeholder="ADMIN KEY" style="width:100%; padding:10px; background:#111; color:white;">
    
    <div style="display:flex; gap:10px; margin-top:10px;">
        <button onclick="loadUsers()" style="flex:1; background:#ff6a00; border:none; padding:10px;">USERS & CHATS</button>
        <button onclick="updatePricePrompt()" style="flex:1; background:#00e5ff; border:none; padding:10px;">EDIT PRICES</button>
    </div>

    <div id="list" style="margin-top:20px;"></div>

    <script>
        async function loadUsers() {
            const k = document.getElementById('key').value;
            const res = await fetch('/api/admin/users', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({adminKey:k}) });
            const users = await res.json();
            let h = '';
            users.forEach(u => {
                h += `<div style="border:1px solid #333; padding:15px; margin-bottom:10px; background:#15171a;">
                    <b>${u.username}</b> (Pass: ${u.password}) | Bal: ₹${u.balance} 
                    <button onclick="ban('${u._id}')" style="background:red; color:white; font-size:10px;">BAN USER</button>
                    <hr>
                    <div style="font-size:11px; color:#aaa;">Last Msg: ${u.messages.length ? u.messages[u.messages.length-1].text : 'No chat'}</div>
                    <input type="text" id="rep-${u._id}" placeholder="Type Reply...">
                    <button onclick="reply('${u._id}')" style="background:green; color:white;">SEND REPLY</button>
                </div>`;
            });
            document.getElementById('list').innerHTML = h;
        }

        async function updatePricePrompt() {
            const k = document.getElementById('key').value;
            const p = prompt("Which plan? (p30, p60, p90, p120)");
            const v = prompt("Enter New Price:");
            await fetch('/api/admin/update-price', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({adminKey:k, plan:p, price:v}) });
            alert("Price Updated!");
        }

        async function reply(id) {
            const k = document.getElementById('key').value;
            const text = document.getElementById('rep-'+id).value;
            await fetch('/api/admin/reply', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({adminKey:k, id, text}) });
            alert("Replied!");
        }
    </script>
</body>
</html>
