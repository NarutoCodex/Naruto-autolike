<!DOCTYPE html>
<html lang="en">
<head>
    <title>MASTER CONTROL</title>
    <style>
        body { background:#000; color:#00ff88; font-family:sans-serif; padding:20px; }
        .card { background:#111; border:1px solid #222; padding:20px; border-radius:15px; margin-bottom:20px; }
        input { width:100%; padding:12px; margin:5px 0; background:#000; border:1px solid #333; color:#fff; border-radius:10px; }
        button { width:100%; padding:15px; background:#00ff88; color:#000; font-weight:bold; border:none; border-radius:10px; cursor:pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2>➕ ADD NEW VIP PLAN</h2>
        <input type="password" id="key" placeholder="Admin Secret Key">
        <input type="number" id="d" placeholder="Days (e.g. 90)">
        <input type="number" id="p" placeholder="Price (e.g. 250)">
        <input type="text" id="t" placeholder="Tag (e.g. BEST SELLER)">
        <input type="number" id="l" placeholder="Total Likes (e.g. 9000)">
        <button onclick="save()">SAVE TO WEBSITE</button>
    </div>

    <script>
        async function save() {
            const data = {
                adminKey: document.getElementById('key').value,
                days: document.getElementById('d').value,
                price: document.getElementById('p').value,
                tag: document.getElementById('t').value,
                totalLikes: document.getElementById('l').value
            };
            const r = await fetch('/api/admin/add-plan', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)});
            if(r.ok) alert("Plan Added Successfully!");
        }
    </script>
</body>
</html>
